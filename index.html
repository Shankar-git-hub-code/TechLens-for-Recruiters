pandas:{cat:"AI & Data Science",name:"Pandas",tl:"Python's essential data manipulation library — the first tool every data scientist reaches for",icon:"ti-table",ibg:"#e8f1fb",icl:"#1558a0",badges:[{t:"Data Science",c:"b-blue"},{t:"Python",c:"b-green"},{t:"Analysis",c:"b-teal"},{t:"DataFrames",c:"b-amber"}],an:{h:"Pandas is like Excel on steroids, controlled by code.",b:"Excel has rows and columns. Pandas has DataFrames — same concept but handling millions of rows, automatable, reproducible, and chainable. Every data scientist uses it daily for cleaning, transforming, and analysing data."},bl:[{n:"Data cleaning pipelines",d:"Removing nulls, fixing formats, and standardising columns before analysis"},{n:"Exploratory data analysis",d:"Understanding distributions, correlations, and outliers in new datasets"},{n:"Financial data processing",d:"Manipulating time-series stock prices and portfolio returns"},{n:"ETL preprocessing",d:"Transforming raw data before loading into a database or ML model"}],kw:["DataFrames & Series","groupby, merge, pivot_table","Missing data handling","Time-series indexing"],qs:["What is the difference between .loc and .iloc in Pandas \u2014 when would you use each?","How have you used Pandas to clean a messy real-world dataset \u2014 what issues did you encounter?","What is the difference between apply, map, and applymap in Pandas?","How does Pandas handle missing data \u2014 what is the difference between NaN and None?","How have you used Pandas for time-series analysis \u2014 what indexing features did you rely on?","What are the performance trade-offs of Pandas for large datasets \u2014 when would you move to Polars or Spark?"],code:"df = pd.read_csv('sales.csv')\nmonthly = (\n  df.groupby('month')['revenue']\n    .sum()\n    .reset_index()\n    .sort_values('revenue', ascending=False)\n)",pl:"Reads a CSV, <strong>groups by month, sums revenue</strong>, resets the index, and sorts highest first. Five words in English; four method calls in Pandas. This replaces a complex Excel pivot table."},
numpy:{cat:"AI & Data Science",name:"NumPy",tl:"Python's fundamental package for numerical computing — the backbone of all scientific and ML Python libraries",icon:"ti-math-function",ibg:"#e8f1fb",icl:"#1558a0",badges:[{t:"Data Science",c:"b-blue"},{t:"Python",c:"b-teal"},{t:"Mathematics",c:"b-green"},{t:"ML backbone",c:"b-amber"}],an:{h:"NumPy is like a calculator that works on entire arrays simultaneously.",b:"Python loops over numbers one at a time. NumPy operates on entire arrays at once using compiled C code — making mathematical operations 100x faster. Every ML library (TensorFlow, PyTorch, scikit-learn) is built on NumPy arrays under the hood."},bl:[{n:"Scientific research computing",d:"Physics, biology, and climate simulations depend on NumPy"},{n:"Image processing pipelines",d:"Images are NumPy arrays — every pixel manipulation uses NumPy"},{n:"Financial quantitative models",d:"Portfolio optimisation, option pricing, and risk calculations"},{n:"Astronomy data analysis",d:"Processing telescope sensor data and gravitational wave signals"}],kw:["ndarray (N-dimensional arrays)","Broadcasting","Linear algebra operations","Random number generation"],qs:["What is broadcasting in NumPy and how does it allow operations on arrays of different shapes?","How does NumPy's vectorised computation differ from Python loops \u2014 what is the performance impact?","What is the difference between a NumPy view and a copy \u2014 why does it matter?","How have you used NumPy for linear algebra operations \u2014 matrix multiplication or decomposition?","What is the difference between NumPy's float32 and float64 \u2014 when does precision choice matter?","How do you generate reproducible random numbers in NumPy?"],code:"import numpy as np\nscores = np.array([85, 92, 78, 95, 88])\nprint(scores.mean(), scores.std())\nnormed = (scores - scores.mean()) / scores.std()",pl:"Creates an array of test scores, calculates <strong>mean and standard deviation in one call each</strong>, then normalises all values simultaneously. No loops — NumPy operates on the whole array at C speed."},
scikitlearn:{cat:"AI & Data Science",name:"Scikit-learn",tl:"Python's machine learning library — clean, consistent API for classical ML algorithms and model evaluation",icon:"ti-brain",ibg:"#fdf0d8",icl:"#8a5200",badges:[{t:"AI/ML",c:"b-amber"},{t:"Python",c:"b-blue"},{t:"Classical ML",c:"b-green"},{t:"Open Source",c:"b-teal"}],an:{h:"Scikit-learn is like a toolbox of pre-built ML algorithms, all with the same interface.",b:"Every algorithm in scikit-learn has the same API: fit() to train, predict() to use, score() to evaluate. Whether you use linear regression or random forests, the code looks the same. This makes experimentation extremely fast."},bl:[{n:"Credit scoring models",d:"Logistic regression and tree models predicting loan default probability"},{n:"Spam classification",d:"Email filtering using text features and classification algorithms"},{n:"Customer churn prediction",d:"Identifying customers likely to cancel using historical behaviour data"},{n:"Medical diagnosis support",d:"Classifying patient data to flag risk conditions for physicians"}],kw:["fit/predict/score API","Cross-validation & pipelines","Feature engineering","Model selection & hyperparameter tuning"],qs:["What is the difference between a Random Forest and a Gradient Boosting model \u2014 when would you choose each?","How do you prevent data leakage when using cross-validation \u2014 what is the correct way to set up a Pipeline?","What is the difference between precision and recall \u2014 when would you optimise for each?","How do you handle class imbalance in a classification problem?","What is hyperparameter tuning \u2014 what is the difference between GridSearchCV and RandomizedSearchCV?","What is the difference between StandardScaler and MinMaxScaler \u2014 when does the choice matter?"],code:"from sklearn.pipeline import Pipeline\nfrom sklearn.ensemble import RandomForestClassifier\n\npipe = Pipeline([\n  ('scaler', StandardScaler()),\n  ('model', RandomForestClassifier(n_estimators=100))\n])\npipe.fit(X_train, y_train)\nprint(pipe.score(X_test, y_test))",pl:"A <strong>Pipeline</strong> chains preprocessing and model training in one object. fit() on training data, score() on test data. The Pipeline ensures the scaler is fit only on training data — preventing the most common machine learning mistake."},
openai:{cat:"AI & Data Science",name:"OpenAI API",tl:"The API powering GPT-4 and DALL-E — enabling developers to add AI text generation, vision, and embedding capabilities",icon:"ti-robot",ibg:"#efedfd",icl:"#4a3db0",badges:[{t:"AI/LLM",c:"b-purple"},{t:"GPT-4",c:"b-blue"},{t:"API",c:"b-teal"},{t:"Generative AI",c:"b-green"}],an:{h:"The OpenAI API is like hiring the world's smartest intern via an HTTP request.",b:"You send a prompt over the internet and get back a thoughtful, fluent response — whether that is code, a legal summary, a customer service reply, or an image. It costs fractions of a cent per request. Teams are embedding it into every product."},bl:[{n:"GitHub Copilot",d:"AI code completion powered by OpenAI's Codex model"},{n:"Duolingo's AI tutor",d:"Personalised language feedback using GPT-4"},{n:"Klarna's customer service bot",d:"Replaced 700 agents with an AI assistant using the API"},{n:"Harvey AI legal platform",d:"AI research and document drafting for law firms"}],kw:["GPT-4 / GPT-4o (chat completions)","Embeddings & vector search","Function calling / tool use","Fine-tuning"],qs:["What is the difference between zero-shot, few-shot, and fine-tuned prompting?","How have you used OpenAI's function calling feature \u2014 what real-world task did it solve?","What is the difference between GPT-4 and an embedding model \u2014 what is each used for?","How do you manage token limits when sending large documents to the OpenAI API?","How have you streamed responses from the OpenAI API to improve perceived latency?","What are the safety and compliance considerations when building products on top of the OpenAI API?"],code:"response = client.chat.completions.create(\n  model='gpt-4o',\n  messages=[\n    {'role': 'system', 'content': 'You are a helpful assistant.'},\n    {'role': 'user', 'content': 'Summarise this contract...'}\n  ]\n)",pl:"Sends a <strong>chat completion request to GPT-4o</strong>. The system message defines behaviour (helpful assistant), the user message contains the task. The response arrives in under a second — ready to display or process."},
pinecone:{cat:"AI & Data Science",name:"Pinecone",tl:"A managed vector database for storing and searching embeddings — the memory layer of AI applications",icon:"ti-database",ibg:"#e6f3e0",icl:"#2d6e18",badges:[{t:"Vector DB",c:"b-green"},{t:"AI/LLM",c:"b-purple"},{t:"Similarity search",c:"b-blue"},{t:"Managed",c:"b-teal"}],an:{h:"Pinecone is like a search engine that understands meaning, not just keywords.",b:"Traditional search finds exact word matches. Pinecone stores numeric representations of meaning (vectors) and finds items that are conceptually similar — even if no words match. This is how AI-powered semantic search and RAG applications work."},bl:[{n:"Notion AI search",d:"Finding relevant pages based on meaning, not keywords"},{n:"Spotify music discovery",d:"Finding songs with similar audio characteristics to what you liked"},{n:"E-commerce semantic search",d:"Returning relevant products even when customers describe them vaguely"},{n:"LangChain RAG applications",d:"Retrieving relevant document chunks to ground LLM answers"}],kw:["Vector embeddings","Similarity search (cosine/dot product)","Namespaces & metadata filtering","upsert / query operations"],qs:["What is the difference between keyword search and vector search \u2014 when does vector search win?","How have you integrated Pinecone with an LLM in a RAG pipeline \u2014 what was the chunk strategy?","What is the difference between cosine similarity and dot product similarity in vector search?","How do you handle metadata filtering in Pinecone \u2014 when is it more efficient than post-filtering?","What are Pinecone namespaces and how do you use them to isolate data for different users?","How do you choose the right embedding model for a vector search use case?"],code:"index.upsert(vectors=[\n  {'id': 'doc1', 'values': embedding, 'metadata': {'text': chunk}}\n])\n\nresults = index.query(\n  vector=query_embedding, top_k=5, include_metadata=True\n)",pl:"Stores a document embedding with metadata, then <strong>retrieves the 5 most semantically similar chunks</strong> to the query embedding. This is the core of a RAG pipeline — finding relevant context before the LLM answers."},
wasm:{cat:"Frontend",name:"WebAssembly",tl:"A binary instruction format enabling near-native performance in the browser — for computationally intensive web apps",icon:"ti-code",ibg:"#efedfd",icl:"#4a3db0",badges:[{t:"Frontend",c:"b-purple"},{t:"Performance",c:"b-blue"},{t:"Multi-language",c:"b-teal"},{t:"W3C Standard",c:"b-green"}],an:{h:"WebAssembly is like turbocharging your browser with a real engine.",b:"JavaScript is interpreted and slow for heavy computations. WebAssembly is a compact binary format that browsers run at near-native speed. C, C++, and Rust code can be compiled to WASM and run in any browser — enabling game engines, video editing, and CAD tools on the web."},bl:[{n:"Figma's rendering engine",d:"Complex vector graphics rendered at 60fps using a C++ WASM module"},{n:"Google Earth for web",d:"3D globe rendering using WebAssembly for near-native performance"},{n:"AutoCAD for web",d:"Full CAD application ported to the browser via WASM"},{n:"Unity web exports",d:"3D game engines running in the browser via WASM compilation"}],kw:["Compilation targets (Rust/C++ to WASM)","JavaScript interop (JS-WASM boundary)","Emscripten toolchain","WASI (WebAssembly System Interface)"],qs:["When would you choose WebAssembly over JavaScript for a browser task \u2014 what are the trade-offs?","How have you passed data between JavaScript and a WASM module efficiently?","What languages can currently be compiled to WebAssembly \u2014 what is each best suited for?","What is WASI (WebAssembly System Interface) and why does it matter beyond the browser?","How does WebAssembly's linear memory model work?","What are the current limitations of WebAssembly that prevent it from replacing JavaScript?"],code:"// Rust compiled to WASM\n#[wasm_bindgen]\npub fn fibonacci(n: u32) -> u32 {\n  match n {\n    0 | 1 => n,\n    _ => fibonacci(n-1) + fibonacci(n-2)\n  }\n}",pl:"A <strong>Rust function compiled to WebAssembly</strong> and exposed to JavaScript via wasm_bindgen. The browser runs this at near-native speed — a computationally expensive algorithm that would freeze the browser in pure JS."},
tailwind:{cat:"Frontend",name:"Tailwind CSS",tl:"A utility-first CSS framework — compose styles by applying small purpose-built classes directly in HTML",icon:"ti-brand-tailwind",ibg:"#e0f4ee",icl:"#0d6e54",badges:[{t:"Frontend",c:"b-teal"},{t:"CSS",c:"b-blue"},{t:"Utility-first",c:"b-green"},{t:"Design system",c:"b-amber"}],an:{h:"Tailwind is like a wardrobe of individual clothing items instead of pre-made outfits.",b:"Traditional CSS frameworks (Bootstrap) give you pre-made components. Tailwind gives you atomic utility classes — px-4, text-blue-500, rounded-lg — that you compose in HTML. No naming CSS classes, no specificity wars, no unused CSS shipped."},bl:[{n:"GitHub's new design system",d:"Parts of GitHub's UI rebuilt using Tailwind utility classes"},{n:"Loom's product UI",d:"Video messaging platform's interface built entirely with Tailwind"},{n:"Every Vercel project template",d:"Vercel's starter templates default to Tailwind for styling"},{n:"Shopify's Polaris evolution",d:"Internal tooling and admin interfaces styled with Tailwind"}],kw:["Utility classes","JIT (Just-in-Time) compiler","Responsive prefixes (sm: md: lg:)","Dark mode & custom theming"],qs:["What is the difference between Tailwind's JIT mode and the traditional purge approach?","How do you handle repeated combinations of Tailwind classes \u2014 @apply vs components?","How do you extend the Tailwind theme \u2014 what is the difference between extend and override?","How have you implemented dark mode with Tailwind \u2014 what are the available strategies?","How does Tailwind work with CSS-in-JS solutions or component libraries like shadcn/ui?","What are the trade-offs of utility-first CSS vs component-based CSS (CSS Modules, styled-components)?"],code:"<button class=\"\n  px-4 py-2\n  bg-blue-600 hover:bg-blue-700\n  text-white font-semibold\n  rounded-lg shadow-sm\n  transition-colors\n\">Submit</button>",pl:"A styled button <strong>entirely in the HTML</strong>, no separate CSS file needed. Each class is a single CSS rule — transparent, composable, and Tailwind's JIT compiler ships only the classes actually used."},
reactquery:{cat:"Frontend",name:"React Query",tl:"A data-fetching and server-state management library for React — eliminates most useEffect data-fetching boilerplate",icon:"ti-brand-react",ibg:"#fdeaea",icl:"#9b2222",badges:[{t:"Frontend",c:"b-red"},{t:"React",c:"b-blue"},{t:"Data fetching",c:"b-teal"},{t:"Caching",c:"b-amber"}],an:{h:"React Query is like a smart cache that knows when to go to the server.",b:"Without React Query, fetching data in React means writing loading states, error states, caching, and refetching logic in every component. React Query handles all of that — you declare what data you need and it manages the rest, keeping server state fresh automatically."},bl:[{n:"Notion-like editors",d:"Document data fetched, cached, and kept fresh without manual logic"},{n:"Dashboard applications",d:"Multiple data sources fetched in parallel, refreshed on interval"},{n:"Infinite scroll feeds",d:"Paginated data fetching with built-in infinite query support"},{n:"Form workflows",d:"Mutations with optimistic updates and automatic rollback on error"}],kw:["useQuery / useMutation hooks","Automatic caching & background refetch","Query invalidation","Optimistic updates"],qs:["What is the difference between client state and server state in React \u2014 how does React Query address the gap?","How have you used query invalidation after a mutation \u2014 walk me through the pattern.","What is the difference between staleTime and cacheTime in React Query?","How have you used React Query for infinite scroll pagination?","How do you handle optimistic updates in React Query \u2014 what happens if the mutation fails?","How have you tested components that use React Query hooks?"],code:"const { data, isLoading } = useQuery({\n  queryKey: ['user', userId],\n  queryFn: () => fetch(`/api/users/${userId}`).then(r => r.json())\n});\n\nif (isLoading) return <Spinner />;",pl:"Fetches user data <strong>with a unique cache key</strong>. React Query caches the result, shows it instantly on revisit, and refreshes in the background. isLoading, error states, and refetching all handled automatically."},
redux:{cat:"Frontend",name:"Redux",tl:"A predictable state container for JavaScript apps — centralises application state with a strict update pattern",icon:"ti-brand-redux",ibg:"#efedfd",icl:"#4a3db0",badges:[{t:"Frontend",c:"b-purple"},{t:"State management",c:"b-blue"},{t:"React",c:"b-green"},{t:"Predictable",c:"b-amber"}],an:{h:"Redux is like a single source of truth whiteboard for your entire app's data.",b:"When data lives scattered across dozens of components, bugs are hard to trace. Redux puts all state in one central store. Every change goes through a reducer function — predictable, debuggable, and replayable. The Redux DevTools let you rewind and replay every state change."},bl:[{n:"Twitter's web app",d:"Global auth state, timelines, and notification data managed in Redux"},{n:"Airbnb's booking flow",d:"Multi-step booking wizard with complex shared state across components"},{n:"Robinhood's trading interface",d:"Real-time portfolio state, orders, and market data synchronisation"},{n:"Figma's editor state",d:"Document, selection, and history state for the collaborative editor"}],kw:["Actions, reducers & store","Redux Toolkit (modern Redux)","Selectors (Reselect)","Middleware (Thunk/Saga)"],qs:["What is the difference between Redux Thunk and Redux Saga for handling async actions?","What problems does Redux solve that React's useState does not \u2014 when is Redux overkill?","What is Redux Toolkit and how does it simplify the Redux boilerplate?","How do you structure Redux selectors \u2014 have you used Reselect for memoisation?","What is the difference between Redux and Zustand \u2014 when would you choose Zustand?","How have you debugged state issues using Redux DevTools?"],code:"const counterSlice = createSlice({\n  name: 'counter',\n  initialState: { value: 0 },\n  reducers: {\n    increment: state => { state.value++ },\n    decrement: state => { state.value-- }\n  }\n})",pl:"Redux Toolkit's <strong>createSlice</strong> combines the reducer and actions in one. Each action is a pure function updating state — predictable, testable, and visible in DevTools as a timestamped log of every state transition."},
storybook:{cat:"Frontend",name:"Storybook",tl:"A frontend workshop for developing, documenting, and testing UI components in isolation",icon:"ti-book",ibg:"#fdf0d8",icl:"#8a5200",badges:[{t:"Frontend",c:"b-amber"},{t:"UI Components",c:"b-blue"},{t:"Documentation",c:"b-teal"},{t:"Testing",c:"b-green"}],an:{h:"Storybook is like a showroom for every UI component in your design system.",b:"Building components inside a real app means dealing with auth, routing, and real data. Storybook isolates each component — button, dropdown, modal — so developers and designers can build and test them in a clean environment, with every variant documented automatically."},bl:[{n:"Airbnb's design system",d:"DLS components documented and maintained in Storybook"},{n:"GitHub's Primer design system",d:"Every Primer component is built and tested in Storybook"},{n:"IBM's Carbon design system",d:"Enterprise component library showcased and tested via Storybook"},{n:"Atlassian's Design System",d:"Jira and Confluence components built component-first in Storybook"}],kw:["Stories (component states)","Controls & args (interactive)","Addons (a11y, viewport)","Component-driven development (CDD)"],qs:["How do you integrate Storybook with your testing strategy \u2014 have you used play functions?","How do you keep Storybook stories in sync with the actual component API as it evolves?","What are Storybook addons \u2014 which ones have you found most useful in practice?","How have you used Storybook for visual regression testing?","How do you document design tokens and component variants effectively in Storybook?","How have you shared a Storybook with non-technical stakeholders \u2014 what deployment setup did you use?"],code:"export const PrimaryButton = {\n  args: {\n    label: 'Submit',\n    variant: 'primary',\n    disabled: false\n  }\n};\n\nexport const DisabledButton = {\n  args: { ...PrimaryButton.args, disabled: true }\n};",pl:"Two <strong>stories documenting a Button component</strong>: one enabled, one disabled. Storybook renders both variants in its UI with interactive controls — designers and engineers see every state without running the full app."},
supabase:{cat:"Databases",name:"Supabase",tl:"An open-source Firebase alternative — PostgreSQL with real-time subscriptions, auth, storage, and auto-generated APIs",icon:"ti-database",ibg:"#e6f3e0",icl:"#2d6e18",badges:[{t:"Database",c:"b-green"},{t:"BaaS",c:"b-blue"},{t:"Real-time",c:"b-teal"},{t:"Open Source",c:"b-amber"}],an:{h:"Supabase is like a fully staffed backend team in a single service.",b:"Instead of setting up a database, auth service, file storage, and API separately, Supabase provides all of that over a managed PostgreSQL instance. Add a table in the Supabase dashboard and instantly get a REST and GraphQL API, row-level security, and real-time subscriptions."},bl:[{n:"Startup MVPs",d:"Teams shipping full-featured apps in days by using Supabase as the entire backend"},{n:"Mozilla's developer tools",d:"Real-time collaborative developer tooling built on Supabase"},{n:"Pika.art",d:"AI image generation platform using Supabase for storage and auth"},{n:"Useberry user research",d:"User testing platform with real-time session tracking via Supabase"}],kw:["PostgreSQL (all SQL features work)","Row Level Security (RLS)","Real-time subscriptions","Supabase Auth & Storage"],qs:["How does Supabase Row Level Security work \u2014 can you write a policy that restricts users to their own data?","What is the difference between Supabase and Firebase \u2014 when would you choose Supabase?","How do Supabase real-time subscriptions work under the hood?","How have you handled database migrations with Supabase \u2014 what tools does it provide?","What is the difference between Supabase Edge Functions and database triggers?","How do you manage environment separation (dev, staging, prod) with Supabase?"],code:"// Subscribe to real-time changes\nsupabase\n  .channel('orders')\n  .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'orders' },\n    payload => console.log('New order:', payload)\n  )\n  .subscribe();",pl:"Subscribes to <strong>real-time database changes</strong>. Every new order inserted into the database triggers this callback instantly — no polling, no websocket management, just a single Supabase call."},
firebase:{cat:"Databases",name:"Firebase",tl:"Google's app development platform — real-time database, auth, hosting, and analytics for mobile and web apps",icon:"ti-brand-firebase",ibg:"#fdf0d8",icl:"#8a5200",badges:[{t:"BaaS",c:"b-amber"},{t:"Google",c:"b-blue"},{t:"Real-time",c:"b-teal"},{t:"NoSQL",c:"b-green"}],an:{h:"Firebase is like a full backend team in a single dashboard.",b:"Building a mobile app normally requires a backend, database, auth service, and hosting. Firebase provides all of this as a managed service. Developers write only client-side code — Firebase handles the server, database, and auth plumbing. Teams ship apps in days, not months."},bl:[{n:"The New York Times games",d:"Wordle and NYT crossword real-time leaderboards via Firebase"},{n:"Alibaba's real-time features",d:"Live auction and flash sale real-time updates"},{n:"NPR's election night coverage",d:"Real-time vote count updates pushed to all visitors simultaneously"},{n:"Duolingo's leaderboards",d:"Weekly XP leaderboards and streak data for 500M+ learners"}],kw:["Firestore (NoSQL document DB)","Firebase Auth (OAuth, email/password)","Cloud Functions","Firebase Hosting & Storage"],qs:["What is the difference between Firestore and the Realtime Database in Firebase \u2014 when would you use each?","How have you structured Firestore security rules to restrict data access per user?","What is the difference between Firestore's onSnapshot listener and a one-time get() call?","How have you handled Firestore's pricing model \u2014 what queries or patterns cause unexpectedly high reads?","How do Firebase Cloud Functions integrate with Firestore triggers?","What are the limitations of Firebase that would cause you to choose a different backend?"],code:"const unsub = onSnapshot(\n  doc(db, 'games', gameId),\n  (snap) => setGame(snap.data())\n);\n// Unsubscribe when done",pl:"Listens to a <strong>game document in real time</strong>. Every time any player changes state, onSnapshot fires and the UI updates automatically — ideal for multiplayer games, live dashboards, and collaborative apps."},
sqlite:{cat:"Databases",name:"SQLite",tl:"A serverless, self-contained SQL database — embedded in billions of devices including every iOS and Android phone",icon:"ti-database",ibg:"#e8f1fb",icl:"#1558a0",badges:[{t:"Database",c:"b-blue"},{t:"Embedded",c:"b-teal"},{t:"Serverless",c:"b-green"},{t:"Zero config",c:"b-amber"}],an:{h:"SQLite is like a database you can put in your pocket.",b:"PostgreSQL and MySQL are server-based — they need a running database server. SQLite is a single file you embed directly in your app. No server, no configuration, no network. It is the world's most deployed database engine — inside every smartphone and most web browsers."},bl:[{n:"Every iOS and Android app",d:"iOS and Android use SQLite as the default local storage database"},{n:"Firefox and Chrome",d:"Browser history, bookmarks, and cache stored in SQLite"},{n:"Airplanes' flight systems",d:"Flight management systems use SQLite for onboard data storage"},{n:"Python's standard library",d:"Python ships with SQLite built in — no installation needed"}],kw:["Embedded database (single file)","Zero configuration","WAL mode (Write-Ahead Logging)","sqlite3 Python module / libsqlite3"],qs:["When would you choose SQLite over PostgreSQL \u2014 what are the limitations that rule it out for production web apps?","How does SQLite's WAL mode improve concurrent read/write performance?","What is the difference between SQLite's type affinity system and PostgreSQL's strict typing?","How have you embedded SQLite in a mobile or desktop application?","What are the concurrency limitations of SQLite and how do they affect application design?","How does Turso (distributed SQLite) change the use cases for SQLite?"],code:"import sqlite3\ncon = sqlite3.connect('app.db')\ncur = con.cursor()\ncur.execute('CREATE TABLE IF NOT EXISTS users (id INTEGER PRIMARY KEY, name TEXT)')\ncur.execute('INSERT INTO users VALUES (?, ?)', (1, 'Alice'))\ncon.commit()",pl:"Opens (or creates) <strong>a local database file</strong>, creates a table, and inserts a row — no server required. The database lives in a single app.db file that can be copied, backed up, or opened by any SQLite tool."},
prisma:{cat:"Databases",name:"Prisma",tl:"A next-generation ORM for Node.js and TypeScript — type-safe database access with auto-generated queries",icon:"ti-database",ibg:"#e0f4ee",icl:"#0d6e54",badges:[{t:"ORM",c:"b-teal"},{t:"TypeScript",c:"b-blue"},{t:"Node.js",c:"b-green"},{t:"Type-safe",c:"b-amber"}],an:{h:"Prisma is like a translator between TypeScript and your database with built-in spell-check.",b:"Raw SQL has no type safety — a typo in a column name only fails at runtime when users hit it. Prisma generates TypeScript types from your database schema — your editor autocompletes column names and flags mistakes before the code runs."},bl:[{n:"Vercel's internal tooling",d:"Prisma is used extensively in Vercel's own developer tooling"},{n:"Cal.com open-source scheduler",d:"Type-safe database access for the scheduling platform's complex data model"},{n:"Wasp framework",d:"Full-stack React/Node framework uses Prisma for all database access"},{n:"Startups' TypeScript backends",d:"The most popular ORM for TypeScript Node.js projects on GitHub"}],kw:["Prisma Schema (data modelling)","Prisma Client (type-safe queries)","Prisma Migrate (schema migrations)","Studio (database browser)"],qs:["How does Prisma's type-safe query builder work \u2014 what happens at the TypeScript compilation step?","How have you handled database migrations with Prisma Migrate in a team setting?","What is the difference between Prisma's findUnique, findFirst, and findMany?","How do you handle relations in Prisma \u2014 how does include differ from select?","What are Prisma's limitations compared to writing raw SQL \u2014 when would you bypass the ORM?","How have you used Prisma in a serverless environment \u2014 what connection pooling challenges arise?"],code:"const user = await prisma.user.findUnique({\n  where: { id: 123 },\n  include: { posts: { take: 5 } }\n});\n// TypeScript knows user.posts is Post[]",pl:"Fetches a user with their <strong>5 most recent posts in one query</strong>. TypeScript knows the exact shape of the returned object — autocomplete shows user.posts, user.email, etc. Column name typos are caught at build time."},
celery:{cat:"Backend",name:"Celery",tl:"A distributed task queue for Python — run background jobs, schedule tasks, and process async workloads",icon:"ti-clock",ibg:"#e6f3e0",icl:"#2d6e18",badges:[{t:"Backend",c:"b-green"},{t:"Python",c:"b-blue"},{t:"Async",c:"b-teal"},{t:"Task queue",c:"b-amber"}],an:{h:"Celery is like a factory floor with workers processing jobs from a conveyor belt.",b:"Some tasks are too slow for a web request — sending emails, processing videos, generating reports. Celery accepts the job from your web app (puts it on the belt), and dedicated worker processes pick it up in the background while the user gets an instant response."},bl:[{n:"Instagram's notification system",d:"Delivering hundreds of millions of push notifications asynchronously"},{n:"Shopify's report generation",d:"Heavy merchant analytics reports generated in background workers"},{n:"Coursera's video processing",d:"Encoding uploaded course videos in background worker queues"},{n:"Lyft's scheduling engine",d:"Driver scheduling and matching algorithms running as background tasks"}],kw:["Tasks & workers","Brokers (Redis / RabbitMQ)","Task scheduling (beat)","Result backends"],qs:["What is the difference between a Celery task and a Celery chord \u2014 when do you need chord?","How have you monitored Celery workers in production \u2014 what tools did you use?","What is the difference between Celery Beat and a regular Celery task?","How do you handle task retries and exponential backoff in Celery?","What is the difference between a Celery task result backend and a broker?","How have you scaled Celery workers \u2014 what is the difference between concurrency and autoscaling?"],code:"@celery_app.task\ndef send_email(user_id: int):\n  user = User.objects.get(id=user_id)\n  mailer.send(user.email, 'Welcome!')\n\n# Called from web request:\nsend_email.delay(user.id)",pl:"Decorating a function with @task registers it as a Celery job. <strong>.delay()</strong> queues it immediately and returns — the web request completes in milliseconds. A worker process picks up the email job and sends it in the background."},
websockets:{cat:"APIs",name:"WebSockets",tl:"A persistent bidirectional communication protocol — enables real-time features without repeated HTTP polling",icon:"ti-plug-connected",ibg:"#e8f1fb",icl:"#1558a0",badges:[{t:"Real-time",c:"b-blue"},{t:"Protocol",c:"b-teal"},{t:"Bidirectional",c:"b-green"},{t:"Persistent",c:"b-amber"}],an:{h:"WebSockets are like a phone call, compared to HTTP's text messages.",b:"HTTP is one-way and stateless — the client sends a message and waits for a response. WebSockets open a persistent connection; both sides can send data at any time. This is how live chat, trading dashboards, and multiplayer games work."},bl:[{n:"Slack's live messaging",d:"Messages appear instantly without the client polling the server"},{n:"Robinhood's live stock prices",d:"Price ticks pushed to every open browser tab in real time"},{n:"Figma's multiplayer cursors",d:"Every collaborator's cursor position broadcast to all viewers live"},{n:"Online chess platforms",d:"Move and clock data pushed to both players the instant they happen"}],kw:["ws:// protocol & upgrade handshake","Socket.io (abstraction layer)","Heartbeat / ping-pong","Reconnection strategies"],qs:["What is the difference between WebSockets and Server-Sent Events \u2014 when would you choose each?","How have you handled WebSocket reconnection logic in a production app?","How do you scale WebSocket connections across multiple servers?","How do you handle authentication for WebSocket connections?","What is the difference between Socket.io and raw WebSockets \u2014 what does Socket.io add?","How do you handle backpressure when a WebSocket client is slow to consume messages?"],code:"const ws = new WebSocket('wss://api.example.com/live');\nws.onmessage = (event) => {\n  const price = JSON.parse(event.data);\n  updateChart(price);\n};\nws.send(JSON.stringify({ subscribe: 'AAPL' }));",pl:"Opens a <strong>persistent WebSocket connection</strong>, subscribes to Apple stock prices, and updates the chart every time the server pushes a new tick. Zero polling, zero delay."},
oauth:{cat:"APIs",name:"OAuth 2.0 / JWT",tl:"The industry standard for delegated authorisation and stateless authentication tokens",icon:"ti-lock",ibg:"#efedfd",icl:"#4a3db0",badges:[{t:"Security",c:"b-purple"},{t:"Auth",c:"b-blue"},{t:"Standard",c:"b-teal"},{t:"Stateless",c:"b-green"}],an:{h:"OAuth is like a hotel key card — access granted without handing over the master key.",b:"Instead of sharing your Google password with every app that wants access, OAuth lets Google issue a limited-scope access token. The app uses the token; your password stays private. JWT is the stateless format those tokens often use."},bl:[{n:"Sign in with Google / Apple",d:"OAuth 2.0 powers every social login button on the internet"},{n:"Stripe's API authentication",d:"OAuth tokens delegate payment permission without sharing keys"},{n:"GitHub's app integrations",d:"Third-party apps access repositories via OAuth scopes"},{n:"Salesforce connected apps",d:"Enterprise integrations using OAuth 2.0 client credentials flow"}],kw:["Authorization Code flow","JWT (header.payload.signature)","Scopes & permissions","Refresh tokens & expiry"],qs:["What is the difference between OAuth 2.0's Authorization Code flow and the Client Credentials flow?","How do you validate a JWT on the server \u2014 what must you verify?","What is the difference between access tokens and refresh tokens \u2014 how do you manage rotation?","What is PKCE and why is it required for public clients in OAuth 2.0?","What is OpenID Connect and how does it extend OAuth 2.0 for authentication?","How have you implemented social login (Google/GitHub) in an application?"],code:"// JWT payload (decoded)\n{\n  'sub': 'user_123',\n  'email': 'alice@example.com',\n  'scope': 'read:orders write:orders',\n  'exp': 1735689600\n}",pl:"A <strong>decoded JWT payload</strong>. The sub identifies the user, scope lists their permissions, and exp is the expiry timestamp. The server validates the signature to confirm it hasn't been tampered with — no database lookup needed."},
stripe:{cat:"APIs",name:"Stripe API",tl:"The developer-friendly payments API — process cards, subscriptions, and payouts with industry-leading documentation",icon:"ti-credit-card",ibg:"#efedfd",icl:"#4a3db0",badges:[{t:"Payments",c:"b-purple"},{t:"API",c:"b-blue"},{t:"SaaS billing",c:"b-teal"},{t:"Webhooks",c:"b-green"}],an:{h:"Stripe is like a payments department you hire via an API.",b:"Building payment processing from scratch — PCI compliance, card vaulting, fraud detection, international currencies — would take a team of engineers years. Stripe's API handles all of it. You integrate in days, Stripe handles the complexity."},bl:[{n:"Shopify's payment processing",d:"Millions of merchants taking payments via Stripe under the hood"},{n:"Notion's subscription billing",d:"Monthly and annual plan billing with automatic renewals"},{n:"Lyft's driver payouts",d:"Weekly driver earnings paid out via Stripe Connect"},{n:"GitHub Sponsors",d:"Developer funding and subscription payments via Stripe"}],kw:["Payment Intents API","Webhooks (event-driven)","Stripe Connect (platform payments)","Stripe Billing (subscriptions)"],qs:["What is the difference between a Stripe Payment Intent and a Charge \u2014 why did Stripe migrate to Payment Intents?","How have you handled Stripe webhook events in production \u2014 what failure scenarios did you design for?","What is Stripe Connect and how have you used it for marketplace or platform payments?","How does Stripe handle 3D Secure authentication \u2014 what is the developer's responsibility?","How have you implemented subscription billing with Stripe \u2014 how do you handle dunning and failed payments?","What is idempotency in the Stripe API and how do idempotency keys prevent duplicate charges?"],code:"const session = await stripe.checkout.sessions.create({\n  payment_method_types: ['card'],\n  line_items: [{ price: priceId, quantity: 1 }],\n  mode: 'subscription',\n  success_url: '/success',\n  cancel_url: '/cancel',\n});",pl:"Creates a <strong>Stripe Checkout session</strong> for a subscription. Stripe handles the payment UI, card validation, 3D Secure, and PCI compliance. You redirect the user to session.url and Stripe does the rest."},
helm:{cat:"DevOps & Cloud",name:"Helm",tl:"The package manager for Kubernetes — package, version, and deploy complex Kubernetes applications",icon:"ti-anchor",ibg:"#efedfd",icl:"#4a3db0",badges:[{t:"DevOps",c:"b-purple"},{t:"Kubernetes",c:"b-blue"},{t:"Package manager",c:"b-teal"},{t:"CNCF",c:"b-green"}],an:{h:"Helm is like apt or npm, but for Kubernetes applications.",b:"Deploying an app on Kubernetes means writing dozens of YAML files — Deployments, Services, Ingresses, ConfigMaps. Helm packages all of these into a chart, versioned and configurable. Install complex software like Prometheus or Nginx in one command."},bl:[{n:"Prometheus & Grafana stacks",d:"The standard monitoring stack deployed via community Helm charts"},{n:"Cert-manager",d:"Automatic SSL certificate management deployed as a Helm chart"},{n:"Enterprise application deployments",d:"Teams package their apps as Helm charts for consistent deployment across environments"},{n:"Argo CD GitOps",d:"GitOps pipelines use Helm charts as the deployment unit"}],kw:["Charts (packaging)","Values files (configuration)","Release management","Hooks & tests"],qs:["What is the difference between a Helm chart's values.yaml and a release override?","How have you used Helm hooks to run database migrations before a deployment?","What is the difference between helm upgrade --install and helm install?","How do you manage secrets in a Helm chart \u2014 what are the common approaches?","What is Helm's dependency management \u2014 how do you use subcharts?","How have you used Helm in a GitOps workflow with Argo CD or Flux?"],code:"# Install with custom values\nhelm install my-app ./chart \\\n  --values prod-values.yaml \\\n  --set image.tag=v2.1.0\n\n# Rollback if something goes wrong\nhelm rollback my-app 1",pl:"Installs an application from a Helm chart with <strong>production-specific configuration</strong>, pinned to a specific container image tag. One command to rollback to the previous version if something goes wrong."},
istio:{cat:"DevOps & Cloud",name:"Istio",tl:"A service mesh that adds traffic management, security, and observability to microservices with zero application code changes",icon:"ti-shield-check",ibg:"#e8f1fb",icl:"#1558a0",badges:[{t:"Service Mesh",c:"b-blue"},{t:"Kubernetes",c:"b-teal"},{t:"CNCF",c:"b-green"},{t:"Zero trust",c:"b-purple"}],an:{h:"Istio is like giving every microservice a security guard and a GPS tracker.",b:"In a microservice architecture, services talk to each other constantly. Istio sits between every service (as a sidecar proxy) and adds mutual TLS encryption, traffic routing, circuit breaking, and distributed tracing — without touching any application code."},bl:[{n:"Lyft's service mesh",d:"Traffic management and security across hundreds of microservices"},{n:"Salesforce's infrastructure",d:"Zero-trust service-to-service encryption in their multi-tenant platform"},{n:"AT&T's network services",d:"Traffic policy enforcement across distributed telco microservices"},{n:"eBay's platform services",d:"Canary deployments and traffic splitting across global services"}],kw:["Sidecar proxy (Envoy)","mTLS (mutual TLS)","Traffic management (canary, circuit breaker)","Distributed tracing (Jaeger/Zipkin)"],qs:["What is the difference between Istio and a standard Kubernetes service \u2014 what does the sidecar proxy add?","How have you used Istio for canary deployments \u2014 what traffic split strategy did you use?","What is mTLS in Istio and why does it matter for zero-trust security?","What is the difference between Istio's VirtualService and DestinationRule?","How does Istio's circuit breaker work \u2014 what conditions trigger it?","What is the performance overhead of Istio's sidecar proxy \u2014 how have you measured it?"],code:"apiVersion: networking.istio.io/v1\nkind: VirtualService\nspec:\n  http:\n  - match: [{ headers: { x-canary: { exact: 'true' } } }]\n    route: [{ destination: { host: app, subset: v2 } }]\n  - route: [{ destination: { host: app, subset: v1 } }]",pl:"A <strong>canary deployment rule</strong>: requests with the header x-canary: true go to v2, all other traffic goes to v1. Istio enforces this routing at the proxy level — the application code knows nothing about it."},
argocd:{cat:"DevOps & Cloud",name:"Argo CD",tl:"A GitOps continuous delivery tool for Kubernetes — the cluster reflects exactly what is in your Git repository",icon:"ti-git-branch",ibg:"#e6f3e0",icl:"#2d6e18",badges:[{t:"GitOps",c:"b-green"},{t:"Kubernetes",c:"b-blue"},{t:"CD",c:"b-teal"},{t:"CNCF",c:"b-amber"}],an:{h:"Argo CD is like a mirror that keeps your cluster in sync with Git.",b:"Traditionally, CI pipelines push deployments by running kubectl commands. GitOps flips this — Argo CD watches your Git repo and pulls any changes into the cluster automatically. If someone manually changes the cluster, Argo CD detects the drift and fixes it."},bl:[{n:"Intuit's platform engineering",d:"Argo CD manages thousands of app deployments across hundreds of clusters"},{n:"Adobe's cloud platform",d:"GitOps for microservice deployments across multiple cloud regions"},{n:"Red Hat OpenShift deployments",d:"Argo CD is the default CD solution in many OpenShift environments"},{n:"Databricks' internal platform",d:"Engineering teams deploy via pull requests; Argo CD syncs automatically"}],kw:["GitOps methodology","Sync & drift detection","Application health checks","Multi-cluster deployment"],qs:["What is the difference between push-based and pull-based CD \u2014 why does Argo CD prefer the pull model?","How have you handled secrets management with Argo CD \u2014 what is the standard approach?","What is Argo CD's application health status \u2014 how does it determine if a sync succeeded?","How do you manage multiple environments with Argo CD \u2014 ApplicationSets or separate apps?","What is the difference between Argo CD and Flux \u2014 when would you choose each?","How have you handled Argo CD access control across multiple teams?"],code:"apiVersion: argoproj.io/v1alpha1\nkind: Application\nspec:\n  source:\n    repoURL: 'https://github.com/myorg/k8s-config'\n    path: apps/production\n  destination:\n    server: 'https://kubernetes.default.svc'\n    namespace: production",pl:"Argo CD watches the <strong>apps/production folder in a Git repo</strong>. Any YAML file committed there is automatically applied to the production cluster. The cluster state is always exactly what Git says it should be."},
splunk:{cat:"DevOps & Cloud",name:"Splunk",tl:"A platform for searching, monitoring, and analysing machine-generated data — the enterprise standard for log management",icon:"ti-search",ibg:"#fdf0d8",icl:"#8a5200",badges:[{t:"Log management",c:"b-amber"},{t:"SIEM",c:"b-red"},{t:"Enterprise",c:"b-blue"},{t:"Observability",c:"b-teal"}],an:{h:"Splunk is like a Google search engine for everything your systems do.",b:"Systems produce millions of log lines per hour. Splunk ingests all of them, indexes every word, and lets you search in real time. Want every error from a specific service in the last 10 minutes? One SPL query returns it in seconds across terabytes of data."},bl:[{n:"Domino's Pizza incident response",d:"Searching application logs across hundreds of servers during incidents"},{n:"US Bank security monitoring",d:"SIEM platform detecting fraud and security anomalies in real time"},{n:"NHS cyber security operations",d:"Centralised log analysis across hospital IT infrastructure"},{n:"Twitch performance monitoring",d:"Stream quality logs analysed in real time to detect encoding issues"}],kw:["SPL (Search Processing Language)","Dashboards & alerts","SIEM & security analytics","HEC (HTTP Event Collector)"],qs:["How does Splunk's SPL differ from SQL \u2014 what is the pipe-based query model?","How have you used Splunk for security incident response \u2014 what does a typical investigation look like?","What is the difference between Splunk indexes, sourcetypes, and sources?","How have you built Splunk dashboards for operational monitoring?","What is Splunk's HEC (HTTP Event Collector) and how have you used it to ingest logs?","How do you manage Splunk licensing costs \u2014 what strategies reduce data ingestion volume?"],code:"index=prod source=/var/log/app.log\n| where status=500\n| stats count by endpoint\n| sort -count\n| head 10",pl:"Searches production logs for HTTP 500 errors, <strong>groups them by API endpoint</strong>, counts occurrences, and shows the 10 worst offenders. An engineer runs this in seconds during an incident to find the root cause."},
datadog:{cat:"DevOps & Cloud",name:"Datadog",tl:"A cloud monitoring, APM, and security platform providing full-stack observability for modern infrastructure",icon:"ti-dog",ibg:"#efedfd",icl:"#4a3db0",badges:[{t:"Monitoring",c:"b-purple"},{t:"APM",c:"b-blue"},{t:"Cloud",c:"b-teal"},{t:"Observability",c:"b-green"}],an:{h:"Datadog is like a medical monitor for your entire technology stack.",b:"A hospital patient monitor tracks heart rate, blood pressure, and oxygen all in one screen. Datadog tracks application performance, infrastructure metrics, logs, and security signals across your entire stack in one platform — alerting before issues become outages."},bl:[{n:"DoorDash's SRE platform",d:"Real-time monitoring of delivery platform health across all regions"},{n:"Samsung's cloud services",d:"Full-stack observability for consumer cloud and IoT infrastructure"},{n:"CircleCI's infrastructure",d:"APM traces and metrics for CI/CD pipeline performance"},{n:"Airbnb's engineering teams",d:"Custom dashboards for every microservice's error rate and latency"}],kw:["APM (distributed tracing)","Infrastructure metrics","Log management","Synthetic monitoring"],qs:["What is the difference between metrics, logs, and traces \u2014 how does Datadog unify them?","How have you used Datadog APM to trace a slow API request end-to-end across microservices?","What is a Datadog Service Level Objective (SLO) and how have you configured one?","How have you used Datadog's custom metrics \u2014 what did you instrument and why?","What is Datadog's tagging strategy and how do you use tags to filter and group data?","How have you set up Datadog monitors to reduce alert fatigue?"],code:"# Custom metric via Datadog agent\nstatsd.increment('orders.placed', tags=['region:us-east'])\nstatsd.histogram('checkout.duration_ms', elapsed_ms)\n\n# Alert: if p95 latency > 500ms for 5 minutes",pl:"Tracks <strong>two custom metrics</strong>: how many orders were placed (by region) and how long checkout took. The Datadog dashboard shows these in real time, and the alert fires if 95th percentile checkout time exceeds 500ms."},
cpp:{cat:"Backend",name:"C++",tl:"A systems programming language offering maximum performance and control — used in game engines, embedded systems, and HPC",icon:"ti-code",ibg:"#fdf0d8",icl:"#8a5200",badges:[{t:"Systems",c:"b-amber"},{t:"High Performance",c:"b-red"},{t:"Game engines",c:"b-blue"},{t:"Embedded",c:"b-teal"}],an:{h:"C++ is like a formula racing car — incredibly fast, but requires an expert driver.",b:"Most languages abstract memory away. C++ gives you direct memory control, zero-overhead abstractions, and machine-level performance. This power comes with complexity — but for game engines, trading systems, and hardware drivers, nothing else compares."},bl:[{n:"Unreal Engine",d:"The leading AAA game engine is written almost entirely in C++"},{n:"Chrome's rendering engine (Blink)",d:"The browser engine rendering pages for billions of Chrome users"},{n:"Adobe Photoshop",d:"Core image processing algorithms for real-time effects on large images"},{n:"High-frequency trading systems",d:"Microsecond-latency order matching engines at stock exchanges"}],kw:["Manual memory management (RAII)","STL (Standard Template Library)","Templates & metaprogramming","Multithreading (std::thread)"],qs:["What is RAII in C++ and how does it prevent memory leaks \u2014 can you give an example?","What is the difference between a smart pointer (unique_ptr, shared_ptr) and a raw pointer?","What is the difference between stack and heap allocation in C++ \u2014 when do you use each?","What are C++ templates and how do they differ from Java generics?","What is undefined behaviour in C++ \u2014 can you give two examples?","What is the Rule of Five in C++ and when does it apply?"],code:"#include <vector>\n#include <algorithm>\n\nstd::vector<int> nums = {5, 2, 8, 1, 9};\nstd::sort(nums.begin(), nums.end());\n// nums is now {1, 2, 5, 8, 9}",pl:"<strong>Sorts a vector of integers</strong> using the STL sort algorithm. In C++ this compiles to near-optimal machine code — the same operation in Python would use an interpreted loop 100x slower for large datasets."},
elixir:{cat:"Backend",name:"Elixir",tl:"A dynamic, functional language on the Erlang VM — built for distributed, fault-tolerant, real-time systems",icon:"ti-droplet",ibg:"#efedfd",icl:"#4a3db0",badges:[{t:"Backend",c:"b-purple"},{t:"Functional",c:"b-blue"},{t:"Erlang VM",c:"b-teal"},{t:"Real-time",c:"b-green"}],an:{h:"Elixir is like a city with millions of tiny residents all doing work simultaneously.",b:"Elixir runs on the Erlang VM, which was built for telephone networks that can never go down. Every Elixir process is lightweight (2KB), isolated, and fault-tolerant. One million concurrent processes on a single server is routine. A crashed process restarts automatically without affecting others."},bl:[{n:"Discord's real-time messaging",d:"Millions of concurrent WebSocket connections managed by Elixir"},{n:"WhatsApp (Erlang/Elixir)",d:"2B+ users' messaging built on Erlang/Elixir's concurrency model"},{n:"Bleacher Report's live sports",d:"Real-time sports scores and notifications for millions of users"},{n:"PagerDuty incident management",d:"High-reliability alert routing that literally cannot afford to go down"}],kw:["Actor model (processes & supervision)","Phoenix web framework","OTP (Open Telecom Platform)","Pattern matching & pipe operator"],qs:["What is the OTP supervision tree in Elixir and how does it provide fault tolerance?","When would you choose Elixir over Node.js for a real-time application?","What is the difference between a GenServer and a Task in Elixir?","How does Elixir's pattern matching work \u2014 can you give a real-world example of where it simplifies code?","What is the difference between Elixir processes and OS threads?","How have you used Phoenix LiveView \u2014 what traditional JavaScript does it replace?"],code:"def handle_message(conn, msg) do\n  msg\n  |> String.trim()\n  |> String.upcase()\n  |> broadcast_to_room(conn.room_id)\nend",pl:"Elixir's <strong>pipe operator (|>)</strong> chains functions elegantly — trim the message, uppercase it, and broadcast it to the room. Readable left-to-right, each transformation passing its output as the next function's input."},
haskell:{cat:"Backend",name:"Haskell",tl:"A purely functional language with a powerful type system — eliminates runtime errors through mathematical correctness guarantees",icon:"ti-math-function",ibg:"#efedfd",icl:"#4a3db0",badges:[{t:"Functional",c:"b-purple"},{t:"Academic",c:"b-blue"},{t:"Type-safe",c:"b-teal"},{t:"Pure FP",c:"b-green"}],an:{h:"Haskell is like a language where the compiler proves your code is correct before it runs.",b:"In most languages, you run code and find bugs. Haskell's type system is so powerful that many entire classes of bugs become impossible to compile — null pointer exceptions, state mutation bugs, and partial function errors can be ruled out at build time."},bl:[{n:"Facebook's spam classification",d:"TML Haskell system analysing billions of content items for spam"},{n:"Standard Chartered bank",d:"Financial modelling and trading analytics in Haskell"},{n:"GitHub's Semantic (code analysis)",d:"Code parsing and semantic analysis tool written in Haskell"},{n:"Cardano blockchain",d:"The Cardano smart contract language (Plutus) is based on Haskell"}],kw:["Pure functions & immutability","Monads (IO, Maybe, Either)","Lazy evaluation","Type classes"],qs:["What is a Monad in Haskell and why is it important for handling side effects in a pure language?","What is the difference between strict and lazy evaluation in Haskell?","What is the difference between a typeclass and an interface in object-oriented languages?","What is the Maybe monad and how does it replace null-checking in Haskell?","What is Haskell's type inference system and how does it work?","What are the practical trade-offs of choosing Haskell for a production system?"],code:"import Data.List (sort, nub)\n\nuniqueSorted :: Ord a => [a] -> [a]\nuniqueSorted = sort . nub\n\nmain = print (uniqueSorted [3,1,4,1,5,9,2,6,5])",pl:"Defines a function using <strong>function composition (.)</strong>: first remove duplicates (nub), then sort. The type signature guarantees this works for any orderable type. The compiler verifies every type constraint before the code runs."},
julia:{cat:"AI & Data Science",name:"Julia",tl:"A high-performance scientific computing language that runs as fast as C while being as readable as Python",icon:"ti-math-function",ibg:"#e8f1fb",icl:"#1558a0",badges:[{t:"Data Science",c:"b-blue"},{t:"High Performance",c:"b-teal"},{t:"Scientific",c:"b-green"},{t:"JIT compiled",c:"b-amber"}],an:{h:"Julia is like Python that discovered it could run as fast as C.",b:"The scientific computing world faces a two-language problem: prototype in Python (slow), rewrite in C (painful). Julia solves both — near-Python readability with near-C speed via JIT compilation. NASA, pharmaceutical researchers, and quantitative finance teams love it."},bl:[{n:"NASA climate models",d:"Atmospheric and ocean simulation models requiring extreme numerical performance"},{n:"MIT Economics Department",d:"Economic modelling and simulation research done in Julia"},{n:"BlackRock's risk models",d:"Portfolio risk calculations requiring both speed and readability"},{n:"Brazilian Banco Central",d:"National economic modelling done in Julia by their research team"}],kw:["Multiple dispatch","JIT compilation (LLVM)","Parallel & distributed computing","Interoperability with Python/R"],qs:["What is multiple dispatch in Julia and how does it differ from method overloading in Java or C#?","When would you recommend Julia over Python for a data science project?","What is Julia's JIT compilation model and why does it cause a time-to-first-plot delay?","How does Julia's type system work \u2014 what is the difference between abstract and concrete types?","How does Julia's package manager work \u2014 how do you manage project environments?","What are the trade-offs of Julia vs Python for production ML deployment?"],code:"function mandelbrot(c, maxiter=100)\n  z = 0\n  for i in 1:maxiter\n    abs(z) > 2 && return i\n    z = z^2 + c\n  end\n  return maxiter\nend",pl:"A <strong>Mandelbrot set iteration</strong> written like Python but JIT-compiled to near-C speed. Julia handles complex number arithmetic natively — no external libraries. Scientific code that is both readable and fast."},

const CATS={};

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function buildNav(){
  document.getElementById('snav').innerHTML=Object.entries(CATS).map(([cat,keys])=>`
    <div class="grp"><p class="gl"><i class="ti ${CI[cat]||'ti-point'}"></i>${esc(cat)}</p>
    ${keys.map(k=>`<button class="nb" data-key="${k}"><i class="ti ${D[k].icon}"></i>${esc(D[k].name)}</button>`).join('')}
    </div>`).join('');
  document.getElementById('cnt').textContent=Object.keys(D).length+' technologies';
}
function buildPills(){
  document.getElementById('hps').innerHTML=Object.keys(CATS).map(c=>
    `<span class="hp" data-cat="${c}"><i class="ti ${CI[c]||'ti-point'}"></i>${esc(c)}</span>`).join('');
}

  if(!q){sgs.style.display='none';return;}
  const all=Object.keys(D);
  const hits=all.filter(k=>
    D[k].name.toLowerCase().includes(q)||
    D[k].cat.toLowerCase().includes(q)||
    (D[k].kw||[]).some(kw=>kw.toLowerCase().includes(q))
  );
  let html=hits.slice(0,10).map(k=>
    `<div class="sg" data-key="${k}"><i class="ti ${D[k].icon}"></i>${esc(D[k].name)}<span class="sgc">${esc(D[k].cat)}</span></div>`
  ).join('');
  if(!hits.length||!hits.find(k=>D[k].name.toLowerCase()===q)){
    html+=`<div class="sg" data-ai="${si.value.trim()}"><i class="ti ti-sparkles" style="color:var(--purple-tx)"></i>Ask AI: "${esc(si.value.trim())}"<span class="sgc" style="color:var(--purple-tx)">AI</span></div>`;
  }
  sgs.innerHTML=html;
  sgs.style.display='block';
});
sgs.addEventListener('click',e=>{
  const item=e.target.closest('[data-key],[data-ai]');
  if(!item)return;
  sgs.style.display='none';si.value='';
  if(item.dataset.key)showTech(item.dataset.key);
  else if(item.dataset.ai)askAI(item.dataset.ai);
});
document.addEventListener('click',e=>{
  if(!si.contains(e.target)&&!sgs.contains(e.target))sgs.style.display='none';
});
si.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const q=si.value.trim();
    if(!q)return;
    const exact=Object.keys(D).find(k=>D[k].name.toLowerCase()===q.toLowerCase());
    if(exact){showTech(exact);sgs.style.display='none';si.value='';}
    else{sgs.style.display='none';si.value='';askAI(q);}
  }
});

// ── SHOW TECH ──
function setActive(key){
  document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('active',b.dataset.key===key));
}
function showTech(key){
  const t=D[key];if(!t)return;
  setActive(key);
  const bl=t.bl.map(b=>`<div class="bi"><div class="bn">${esc(b.n)}</div><div class="bdt">${esc(b.d)}</div></div>`).join('');
  const bgs=(t.badges||[]).map(b=>`<span class="bg ${b.c}">${esc(b.t)}</span>`).join('');
  const kws=(t.kw||[]).map(k=>`<span class="kw">${esc(k)}</span>`).join('');
  const qs=(t.qs||[]).map((q,i)=>`<div class="qi"><span class="qn">Q${i+1}</span><span>${esc(q)}</span></div>`).join('');
  document.getElementById('content').innerHTML=`
<div class="hero">
  <div class="tib" style="background:${t.ibg}"><i class="ti ${t.icon}" style="font-size:26px;color:${t.icl}"></i></div>
  <div><div class="ht">${esc(t.name)}</div><div class="hs">${esc(t.tl)}</div><div class="bgs">${bgs}</div></div>
</div>
<div class="secs">
  <div class="card"><div class="ch"><i class="ti ti-bulb" style="color:var(--amber-tx)"></i><span class="ct">Real-world analogy</span></div>
    <div class="ab"><div class="ah">${esc(t.an.h)}</div><div class="at">${esc(t.an.b)}</div></div></div>
  <div class="card"><div class="ch"><i class="ti ti-building" style="color:var(--blue-tx)"></i><span class="ct">What it actually builds</span></div>
    <div class="bg2">${bl}</div></div>
  <div class="card"><div class="ch"><i class="ti ti-clipboard-list" style="color:var(--green-tx)"></i><span class="ct">Recruiter cheat sheet</span></div>
    <div class="cr">
      <div><div class="cs">Resume keywords to look for</div><div class="kl">${kws}</div></div>
      <div><div class="cs">Smart screening questions (${(t.qs||[]).length})</div>${qs}</div>
    </div></div>

</div>`;
  // Scroll top on mobile
  document.querySelector('.main').scrollTop=0;
}

// ── ASK AI ──
async function askAI(term){
  setActive(null);
  document.getElementById('content').innerHTML=`
<div class="ail">
  <div class="spin"></div>
  <p style="color:var(--t2);font-size:13px">Generating a full breakdown for <strong>${esc(term)}</strong>…</p>
  <span class="aib"><i class="ti ti-sparkles"></i>AI-powered</span>
</div>`;
  const prompt=`You are a tech explainer for non-technical recruiters. Generate a JSON object for the technology "${term}".
Return ONLY valid JSON, no markdown, no backticks, no preamble.
Use this exact structure:
{
  "cat": "one of: Frontend|Backend|Databases|DevOps & Cloud|AI & Data Science|Mobile|Testing & Security|APIs|Tooling|Design & Product|Data Engineering|CRM & Enterprise|Blockchain",
  "name": "display name",
  "tl": "one sentence tagline",
  "icon": "a tabler icons class name like ti-brand-react or ti-code",
  "ibg": "#hexcolor for icon background (light pastel)",
  "icl": "#hexcolor for icon color (dark matching)",
  "badges": [{"t":"label","c":"b-blue|b-green|b-amber|b-red|b-purple|b-teal|b-pink"}],
  "an": {"h": "analogy headline (one sentence)", "b": "analogy body (2-3 sentences, simple language)"},
  "bl": [{"n":"company or product","d":"what it built with this tech"},{"n":"...","d":"..."},{"n":"...","d":"..."},{"n":"...","d":"..."}],
  "kw": ["Resume keyword 1","keyword 2","keyword 3","keyword 4"],
  "qs": ["Smart screening question 1?","Smart screening question 2?"],
  "code": "a short 6-10 line real code snippet",
  "pl": "Plain English explanation of the code using <strong> tags to highlight key concepts"
}`;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await r.json();
    const text=data.content.map(c=>c.text||'').join('');
    const cleaned=text.replace(/```json|```/g,'').trim();
    const obj=JSON.parse(cleaned);
    const key=term.toLowerCase().replace(/[^a-z0-9]/g,'_');
    D[key]=obj;
    if(!CATS[obj.cat]){CATS[obj.cat]=[];buildNav();}
    else if(!CATS[obj.cat].includes(key)){CATS[obj.cat].push(key);buildNav();}
    document.getElementById('cnt').textContent=Object.keys(D).length+' technologies';
    showTech(key);
  }catch(err){
    document.getElementById('content').innerHTML=`
<div class="ail">
  <i class="ti ti-alert-triangle" style="font-size:32px;color:var(--amber-tx)"></i>
  <p style="color:var(--t2);font-size:13px">Could not generate a breakdown for <strong>${esc(term)}</strong>.</p>
  <p style="color:var(--t3);font-size:12px">This AI feature only works inside Claude.ai. All ${Object.keys(D).length} built-in technologies work offline.</p>
</div>`;
  }
}

buildNav();
buildPills();

</script></body></html>
