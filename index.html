<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TechLens for Recruiters</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f3;--sf:#fff;--s2:#f2f1ee;--bd:#e4e3de;--bd2:#d0cfc9;
  --tx:#1a1917;--t2:#5c5b57;--t3:#9c9b97;
  --blue-bg:#e8f1fb;--blue-tx:#1558a0;--green-bg:#e6f3e0;--green-tx:#2d6e18;
  --amber-bg:#fdf0d8;--amber-tx:#8a5200;--red-bg:#fdeaea;--red-tx:#9b2222;
  --purple-bg:#efedfd;--purple-tx:#4a3db0;--teal-bg:#e0f4ee;--teal-tx:#0d6e54;
  --pink-bg:#fce8f3;--pink-tx:#9b1f6e;
  --rsm:6px;--rmd:10px;--rlg:14px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);font-size:15px;line-height:1.6;min-height:100vh}
.app{display:flex;min-height:100vh}
.sb{width:220px;flex-shrink:0;background:var(--sf);border-right:1px solid var(--bd);padding:.875rem .75rem;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{display:flex;align-items:center;gap:8px;margin-bottom:.875rem;padding-bottom:.875rem;border-bottom:1px solid var(--bd)}
.logo i{font-size:22px;color:var(--blue-tx)}
.lt{font-size:13.5px;font-weight:600;line-height:1.2}
.ls{font-size:10px;color:var(--t3);font-weight:400;display:block}
.grp{margin-bottom:.75rem}
.gl{font-size:9px;text-transform:uppercase;letter-spacing:.09em;color:var(--t3);font-weight:600;margin-bottom:3px;padding-left:6px;display:flex;align-items:center;gap:4px}
.gl i{font-size:11px}
.nb{display:flex;align-items:center;gap:7px;width:100%;text-align:left;padding:5px 8px;border-radius:var(--rsm);border:none;background:transparent;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--t2);cursor:pointer;margin-bottom:1px;transition:background .1s,color .1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nb i{font-size:13px;flex-shrink:0}
.nb:hover{background:var(--s2);color:var(--tx)}
.nb.active{background:var(--blue-bg);color:var(--blue-tx);font-weight:500}
.main{flex:1;padding:1.25rem 1.5rem;min-width:0}
.topbar{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem}
.sw{position:relative;flex:1;max-width:620px}
.si-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--t3);pointer-events:none}
#si{width:100%;padding:9px 12px 9px 33px;border-radius:var(--rmd);border:1px solid var(--bd2);background:var(--sf);font-size:13.5px;font-family:'DM Sans',sans-serif;color:var(--tx)}
#si::placeholder{color:var(--t3)}
#si:focus{outline:none;border-color:#7baae8;box-shadow:0 0 0 3px rgba(123,170,232,.16)}
.sgs{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--sf);border:1px solid var(--bd2);border-radius:var(--rmd);z-index:100;overflow:hidden;box-shadow:0 4px 18px rgba(0,0,0,.1);max-height:320px;overflow-y:auto}
.sg{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:13px;cursor:pointer;color:var(--t2)}
.sg i{font-size:13px;color:var(--t3);flex-shrink:0}
.sg:hover{background:var(--s2);color:var(--tx)}
.sgc{font-size:10px;color:var(--t3);margin-left:auto;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0}
.cnt{font-size:11.5px;color:var(--t3);white-space:nowrap}
.home{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:420px;gap:10px;text-align:center;color:var(--t3)}
.hi{width:60px;height:60px;background:var(--s2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:8px}
.home h2{font-size:15.5px;font-weight:500;color:var(--t2)}
.home p{font-size:13px;max-width:380px;line-height:1.65}
.hps{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-top:10px;max-width:560px}
.hp{font-size:11.5px;padding:4px 11px;border-radius:20px;border:1px solid var(--bd2);color:var(--t2);background:var(--sf);cursor:pointer;display:flex;align-items:center;gap:5px;transition:background .1s}
.hp i{font-size:12px}
.hp:hover{background:var(--s2)}
.hero{display:flex;align-items:flex-start;gap:14px;margin-bottom:1.125rem;padding-bottom:1.125rem;border-bottom:1px solid var(--bd)}
.tib{width:52px;height:52px;border-radius:var(--rmd);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ht{font-size:21px;font-weight:600;margin-bottom:3px}
.hs{font-size:13px;color:var(--t2);margin-bottom:8px;line-height:1.5}
.bgs{display:flex;flex-wrap:wrap;gap:5px}
.bg{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.b-blue{background:var(--blue-bg);color:var(--blue-tx)}.b-green{background:var(--green-bg);color:var(--green-tx)}
.b-amber{background:var(--amber-bg);color:var(--amber-tx)}.b-red{background:var(--red-bg);color:var(--red-tx)}
.b-purple{background:var(--purple-bg);color:var(--purple-tx)}.b-teal{background:var(--teal-bg);color:var(--teal-tx)}
.b-pink{background:var(--pink-bg);color:var(--pink-tx)}
.secs{display:grid;gap:.875rem}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rlg);padding:.9rem 1.125rem}
.ch{display:flex;align-items:center;gap:7px;margin-bottom:.8rem}
.ch i{font-size:16px}.ct{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--t3)}
.ab{background:var(--s2);border-radius:var(--rmd);padding:.8rem .95rem}
.ah{font-size:15px;font-weight:600;color:var(--tx);margin-bottom:5px}
.at{font-size:13px;color:var(--t2);line-height:1.65}
.bg2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.bi{background:var(--s2);border-radius:var(--rmd);padding:8px 11px;border:1px solid var(--bd)}
.bn{font-size:12.5px;font-weight:600;margin-bottom:2px}
.bdt{font-size:11.5px;color:var(--t2);line-height:1.5}
.cr{display:flex;flex-direction:column;gap:1rem}
.cs{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.kl{display:flex;flex-wrap:wrap;gap:5px}
.kw{font-size:11.5px;padding:3px 9px;background:var(--s2);border:1px solid var(--bd2);border-radius:var(--rsm);color:var(--t2);font-weight:500}
.qi{display:flex;gap:9px;font-size:13px;line-height:1.6;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--bd)}.qi:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.qn{font-size:10px;font-weight:700;flex-shrink:0;background:var(--blue-bg);color:var(--blue-tx);border-radius:4px;padding:2px 7px;height:fit-content;margin-top:2px;min-width:28px;text-align:center}
.ail{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:320px;gap:12px}
.spin{width:34px;height:34px;border:3px solid var(--bd);border-top-color:var(--blue-tx);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.aib{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 9px;background:var(--purple-bg);color:var(--purple-tx);border-radius:20px;font-weight:500}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
</style>
</head>
<body>
<div class="app">
  <aside class="sb">
    <div class="logo"><i class="ti ti-eye-search"></i><div class="lt">TechLens<span class="ls">For Recruiters</span></div></div>
    <div id="snav"></div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div class="sw">
        <i class="ti ti-search si-ico"></i>
        <input type="text" id="si" placeholder="Search 120+ technologies — or type any to get an AI answer…" autocomplete="off"/>
        <div class="sgs" id="sgs"></div>
      </div>
      <div class="cnt" id="cnt"></div>
    </div>
    <div id="content">
      <div class="home">
        <div class="hi"><i class="ti ti-eye-search"></i></div>
        <h2>Your one-stop tech reference for recruiting</h2>
        <p>120+ technologies built-in across every category. Type anything not listed and the AI generates a full breakdown instantly.</p>
        <div class="hps" id="hps"></div>
      </div>
    </div>
  </main>
</div>

react:{cat:"Frontend",name:"React",tl:"Meta's library for building component-based user interfaces",icon:"ti-brand-react",ibg:"#ddeeff",icl:"#1558a0",badges:[{t:"Frontend",c:"b-blue"},{t:"JavaScript",c:"b-amber"},{t:"Meta",c:"b-green"},{t:"2013",c:"b-teal"}],an:{h:"React is like LEGO bricks for websites.",b:"Just like LEGO lets you build elaborate models from small reusable bricks, React lets developers build complex UIs from small reusable components — a button, a card, a nav bar — built once and snapped together everywhere."},bl:[{n:"Facebook & Instagram feeds",d:"Dynamic infinite-scroll feeds updating without a page refresh"},{n:"Netflix homepage",d:"Rows of personalised content updating based on watch history"},{n:"Airbnb listing pages",d:"Interactive maps, date pickers, and booking flows"},{n:"Notion editor",d:"Real-time collaborative block-based rich-text editing"}],kw:["Component-based architecture","Virtual DOM","React Hooks (useState/useEffect)","State management (Redux/Zustand)"],qs:["Walk me through how you've managed shared state across deeply nested components \u2014 what did you use and why?","What is the difference between useEffect and useLayoutEffect, and when would you reach for each?","How do you decide when a component is doing too much and needs to be split \u2014 what signals tell you?","What strategies have you used to optimise a React app with performance issues \u2014 what tools helped you find the bottleneck?","Explain the difference between controlled and uncontrolled components. Which do you prefer and in what situations?","How have you handled data fetching in React \u2014 have you used React Query, SWR, or rolled your own \u2014 what drove that choice?"],code:"function Greeting({ name }) {\n  return <h1>Hello, {name}!</h1>;\n}\n<Greeting name=\"Sarah\" />",pl:"A reusable <strong>Greeting building block</strong>. Pass a name, get a personalised heading. Drop it anywhere on the site — React fills in the right name automatically."},
vue:{cat:"Frontend",name:"Vue",tl:"A progressive JavaScript framework loved for its gentle learning curve and clean templates",icon:"ti-brand-vue",ibg:"#e6f3e0",icl:"#2d6e18",badges:[{t:"Frontend",c:"b-green"},{t:"JavaScript",c:"b-amber"},{t:"Progressive",c:"b-teal"},{t:"Open Source",c:"b-blue"}],an:{h:"Vue is like React's more approachable sibling.",b:"If React is a LEGO Technic set — powerful but complex — Vue is standard LEGO: simpler to start with, equally capable for most projects. Its readable templates make it a favourite for teams valuing productivity."},bl:[{n:"Alibaba's storefront",d:"Enterprise-scale e-commerce product listing UIs"},{n:"GitLab web interface",d:"Code review, merge requests, and project management"},{n:"Chess.com",d:"Real-time board rendering and live match updates"},{n:"Behance by Adobe",d:"Creative portfolio pages with rich interactive galleries"}],kw:["Vue Composition API","Vuex / Pinia (state)","Single File Components (.vue)","Nuxt.js (SSR/static)"],qs:["What is the difference between Vue's Options API and Composition API \u2014 when do you prefer each?","How have you handled reactive state shared across multiple unrelated components in Vue?","How does Vue's reactivity system detect changes \u2014 what are its limitations with arrays and objects?","Have you built a Nuxt.js app \u2014 how did you handle SSR, data fetching, and caching?","What is the difference between a computed property and a watcher in Vue \u2014 when would you use each?","How do you structure a large Vue application \u2014 how do you organise components, composables, and stores?"],code:"<template>\n  <p>Count: {{ count }}</p>\n  <button @click=\"count++\">+1</button>\n</template>\n<script setup>\nconst count = ref(0);\n<\/script>",pl:"A <strong>live counter widget</strong>. Every click increments the number and Vue instantly updates the display — no manual DOM manipulation needed."},
angular:{cat:"Frontend",name:"Angular",tl:"Google's full-featured TypeScript framework for large-scale enterprise web applications",icon:"ti-brand-angular",ibg:"#fdeaea",icl:"#9b2222",badges:[{t:"Frontend",c:"b-red"},{t:"TypeScript",c:"b-blue"},{t:"Google",c:"b-green"},{t:"Enterprise",c:"b-amber"}],an:{h:"Angular is like a pre-furnished office building for web apps.",b:"React gives you bricks; Angular gives you the whole building — routing, forms, HTTP, and testing all included. Opinionated and structured, ideal for large teams where consistency matters most."},bl:[{n:"Google Cloud Console",d:"Complex cloud infrastructure management UI"},{n:"Deutsche Bank trading platform",d:"Financial dashboards requiring strict type safety"},{n:"Microsoft Office Online",d:"Web versions of Word, Excel, and PowerPoint"},{n:"Forbes.com",d:"Content-heavy editorial site with complex layouts"}],kw:["TypeScript + decorators","RxJS / Observables","Angular modules & lazy loading","NgRx (state management)"],qs:["How do you manage performance in a large Angular app \u2014 what change detection strategies have you used?","Explain the difference between a Subject and a BehaviorSubject in RxJS \u2014 when is each appropriate?","What is the difference between Angular modules and standalone components \u2014 how has the architecture evolved?","How have you lazy-loaded feature modules in Angular \u2014 what impact did it have on initial bundle size?","What is the difference between a service provided in root vs provided in a specific module?","How have you written and organised unit tests in Angular \u2014 what tools and patterns did you use?"],code:"@Component({\n  selector: 'app-hello',\n  template: `<h1>Hello {{name}}</h1>`\n})\nexport class HelloComponent {\n  name = 'World';\n}",pl:"Defines an <strong>Angular component</strong> — a self-contained UI block. The @Component decorator tells Angular this class is a component with a custom HTML tag."},
nextjs:{cat:"Frontend",name:"Next.js",tl:"A React framework adding server-side rendering, routing, and full-stack capabilities out of the box",icon:"ti-brand-nextjs",ibg:"#f2f1ee",icl:"#1a1917",badges:[{t:"Frontend",c:"b-blue"},{t:"React",c:"b-teal"},{t:"Full-stack",c:"b-purple"},{t:"Vercel",c:"b-green"}],an:{h:"Next.js is React with a turbocharger and a GPS.",b:"React builds the UI. Next.js adds routing so pages have URLs, server rendering so Google can index content, and API routes so you can write backend logic in the same project. One tool, full-stack."},bl:[{n:"TikTok for Business",d:"Ad platform built for performance and SEO"},{n:"Hulu marketing site",d:"Content-heavy pages requiring fast initial load"},{n:"Twitch creator dashboard",d:"Complex real-time dashboard with server components"},{n:"Notion public pages",d:"Shareable docs with SEO and fast first paint"}],kw:["SSR / SSG","App Router / file-based routing","React Server Components","ISR (incremental static regeneration)"],qs:["When would you choose SSR over SSG in Next.js \u2014 what factors drive that decision?","What is the difference between the Pages Router and the App Router in Next.js?","How do React Server Components change the way you think about data fetching?","How have you handled authentication in a Next.js app \u2014 what approach did you use for protecting routes?","What is ISR (Incremental Static Regeneration) and when is it the right choice over full SSR?","How do you manage environment variables in Next.js \u2014 what is the difference between server-side and client-side vars?"],code:"export default async function Page() {\n  const data = await fetchData();\n  return <main>{data.title}</main>;\n}",pl:"A <strong>server-rendered page</strong>. Data is fetched on the server before the user sees anything — the page arrives pre-filled, fast to load and indexable by search engines."},

elasticsearch:{cat:"Databases",name:"Elasticsearch",tl:"A distributed search and analytics engine — powers full-text search, log analytics, and real-time dashboards",icon:"ti-search",ibg:"#fdf0d8",icl:"#8a5200",badges:[{t:"Search",c:"b-amber"},{t:"Analytics",c:"b-blue"},{t:"Elastic",c:"b-green"},{t:"Real-time",c:"b-teal"}],an:{h:"Elasticsearch is like giving your database a search engine's brain.",b:"Regular databases are bad at 'find me products similar to this description'. Elasticsearch indexes every word in every document and returns fuzzy-matched, relevance-ranked results across billions of records in milliseconds."},bl:[{n:"Wikipedia full-text search",d:"Searching millions of articles with typo tolerance and relevance"},{n:"GitHub code search",d:"Searching billions of lines of code across millions of repositories"},{n:"Uber's log analytics",d:"Ingesting and searching billions of application log events"},{n:"eBay product search",d:"Relevance-ranked discovery across hundreds of millions of listings"}],kw:["Inverted index & relevance scoring","Kibana (visualisation)","ELK / Elastic Stack","Aggregations & analytics"],qs:["How does Elasticsearch's inverted index differ from a regular database index?","How have you used Elasticsearch in production \u2014 what was the ingestion rate and query latency?","What is the difference between a query and a filter in Elasticsearch \u2014 when does it matter?","How do you handle index mappings in Elasticsearch \u2014 what happens when you get the mapping wrong?","What is an Elasticsearch shard and how do you decide how many shards a new index should have?","How have you used Elasticsearch aggregations \u2014 can you give a real-world analytics example?"],code:"GET /products/_search\n{\n  \"query\": {\n    \"match\": { \"description\": \"wireless headphones\" }\n  },\n  \"sort\": [{ \"_score\": \"desc\" }]\n}",pl:"Searches all product descriptions for <strong>wireless headphones</strong> with full-text relevance ranking — handling typos and returning close matches. A SQL LIKE clause cannot do this at scale."},
cassandra:{cat:"Databases",name:"Cassandra",tl:"A distributed NoSQL database designed for massive write throughput and multi-datacenter fault tolerance",icon:"ti-database",ibg:"#fdf0d8",icl:"#8a5200",badges:[{t:"NoSQL",c:"b-amber"},{t:"Distributed",c:"b-blue"},{t:"Apache",c:"b-teal"},{t:"Facebook",c:"b-green"}],an:{h:"Cassandra is like a post office network with no single head office.",b:"Traditional databases have one primary server — if it fails, everything fails. Cassandra is distributed with no single point of failure. Data is replicated across nodes, and any node can answer any query. Perfect for systems that can never go down."},bl:[{n:"Netflix global storage",d:"Storing play positions and viewing history for 260M+ users"},{n:"Discord's message history",d:"Hundreds of billions of messages with sub-millisecond reads"},{n:"Uber's geospatial data",d:"Real-time driver and trip data replicated across regions"},{n:"Instagram's feed storage",d:"High-write activity data needing global availability"}],kw:["CQL (Cassandra Query Language)","Partition keys & clustering","Eventual consistency","Replication factor"],qs:["How does Cassandra's eventual consistency differ from ACID \u2014 how do you design around it?","How do you model data in Cassandra \u2014 what is different from relational modelling?","What is a partition key in Cassandra and why is choosing it correctly so important?","What is the difference between consistency level ONE, QUORUM, and ALL in Cassandra?","What are tombstones in Cassandra and why can they cause performance problems?","How have you monitored and tuned a Cassandra cluster in production?"],code:"CREATE TABLE messages (\n  user_id  UUID,\n  sent_at  TIMESTAMP,\n  body     TEXT,\n  PRIMARY KEY (user_id, sent_at)\n);",pl:"Cassandra tables are designed around <strong>query patterns, not data relationships</strong>. This table is partitioned by user_id so all of a user's messages are co-located — enabling blazing fast reads for a single user's history."},
dynamodb:{cat:"Databases",name:"DynamoDB",tl:"Amazon's fully managed NoSQL database — virtually unlimited scale with single-digit millisecond latency",icon:"ti-database",ibg:"#fdf0d8",icl:"#8a5200",badges:[{t:"NoSQL",c:"b-amber"},{t:"AWS",c:"b-blue"},{t:"Serverless",c:"b-teal"},{t:"Managed",c:"b-green"}],an:{h:"DynamoDB is like a warehouse that automatically adds more shelves as your inventory grows.",b:"Traditional databases require you to predict capacity. DynamoDB scales automatically with zero downtime — add ten customers or ten million, it handles both with the same single-digit millisecond response time and zero maintenance."},bl:[{n:"Amazon.com product catalog",d:"Trillions of items stored and retrieved at Amazon's shopping scale"},{n:"Snapchat stories",d:"Time-sensitive content with massive concurrent writes worldwide"},{n:"Lyft's real-time ride data",d:"Driver locations, ride status, and pricing updated continuously"},{n:"Duolingo user progress",d:"Lesson completion, streaks, and XP for 500M+ learners"}],kw:["Partition keys & sort keys","GSI / LSI (secondary indexes)","DynamoDB Streams","On-demand vs provisioned capacity"],qs:["How does DynamoDB's data modelling differ from relational \u2014 what is single-table design?","What is the difference between a GSI and an LSI in DynamoDB \u2014 when would you use each?","How do you handle pagination in DynamoDB \u2014 what are the limitations vs SQL OFFSET?","What is DynamoDB Streams and how have you used it to trigger downstream processing?","How do you choose between on-demand and provisioned capacity in DynamoDB?","What are the trade-offs of DynamoDB's key-value model when your access patterns change?"],code:"await dynamodb.put({\n  TableName: 'Users',\n  Item: {\n    userId: '123',\n    name: 'Sarah',\n    createdAt: Date.now()\n  }\n}).promise();",pl:"Writes a <strong>user record to DynamoDB</strong>. Unlike SQL, there is no schema — you just put items in. DynamoDB handles the storage, replication, and scaling automatically across AWS availability zones."},
neo4j:{cat:"Databases",name:"Neo4j",tl:"The leading graph database — models relationships as first-class citizens for social networks and fraud detection",icon:"ti-affiliate",ibg:"#efedfd",icl:"#4a3db0",badges:[{t:"Graph DB",c:"b-purple"},{t:"Relationships",c:"b-blue"},{t:"NoSQL",c:"b-teal"},{t:"Cypher",c:"b-green"}],an:{h:"Neo4j is like a map that shows roads between cities instead of a list of cities.",b:"Relational databases store data in tables; relationships are computed via joins. Neo4j stores relationships as physical connections — traversing 'friends of friends of friends' across a million people takes milliseconds, not minutes."},bl:[{n:"LinkedIn's People You May Know",d:"Graph traversal finding connections-of-connections"},{n:"eBay fraud detection",d:"Identifying fraud rings by mapping relationships between accounts"},{n:"NASA knowledge graph",d:"Connecting concepts, missions, and discoveries across decades"},{n:"Walmart's product knowledge",d:"Mapping product relationships for recommendation engines"}],kw:["Cypher query language","Graph traversal algorithms","Property graphs","APOC library"],qs:["What types of problems are graph databases better suited for than relational databases?","How does Neo4j's Cypher query language work \u2014 can you write a query to find friends of friends?","What is the difference between a node label and a relationship type in Neo4j?","How does graph traversal performance scale as the depth of traversal increases in Neo4j?","What is the APOC library in Neo4j and what kinds of operations does it enable?","How have you modelled a domain in Neo4j \u2014 what decisions did you make about node vs relationship properties?"],code:"MATCH (u:User {name: 'Alice'})\n  -[:FOLLOWS]->(friend)\n  -[:FOLLOWS]->(fof)\nWHERE NOT (u)-[:FOLLOWS]->(fof)\nRETURN fof.name LIMIT 10",pl:"Finds <strong>friends of Alice's friends</strong> that Alice doesn't already follow — the same logic powering 'people you may know'. In SQL this would require complex docker:{cat:"DevOps & Cloud",name:"Docker",tl:"A containerisation tool that packages apps and all dependencies into portable, self-contained units",icon:"ti-brand-docker",ibg:"#ddeeff",icl:"#1558a0",badges:[{t:"DevOps",c:"b-blue"},{t:"Containers",c:"b-teal"},{t:"Infrastructure",c:"b-amber"},{t:"2013",c:"b-green"}],an:{h:"Docker is like a shipping container for software.",b:"Before standardised shipping containers, loading cargo was chaotic. Containers standardised the box. Docker does the same for software — wraps an app and everything it needs into one container that runs identically anywhere."},bl:[{n:"Spotify microservices",d:"Each feature — search, playlist, radio — in its own isolated container"},{n:"GitHub Actions CI/CD",d:"Fresh clean environments spinning up for every code push"},{n:"Dev environment sharing",d:"The works-on-my-machine problem solved permanently"},{n:"Every major cloud platform",d:"Docker containers are the universal unit of cloud deployment"}],kw:["Dockerfile authoring","Docker Compose (multi-service)","Image layers & registry","Container networking & volumes"],qs:["Walk me through how you structured a multi-container app with Docker Compose \u2014 what services were involved?","How do you keep Docker images lean and secure in production?","What is the difference between CMD and ENTRYPOINT in a Dockerfile?","How do Docker volumes work \u2014 what is the difference between a bind mount and a named volume?","How have you handled secrets in Docker containers \u2014 what do you avoid doing?","What is a multi-stage Docker build and why would you use one?"],code:"FROM node:20-alpine\nWORKDIR /app\nCOPY package*.json ./\nRUN npm ci --only=production\nCOPY . .\nCMD [\"node\", \"server.js\"]",pl:"A recipe called a <strong>Dockerfile</strong>: start with slim Node.js, install only production dependencies, copy the app, start the server. Anyone with Docker can run this and get the identical working app."},
kubernetes:{cat:"DevOps & Cloud",name:"Kubernetes",tl:"An orchestration platform automating deployment, scaling, and self-healing of containerised applications",icon:"ti-topology-ring",ibg:"#efedfd",icl:"#4a3db0",badges:[{t:"DevOps",c:"b-purple"},{t:"Orchestration",c:"b-blue"},{t:"Cloud-native",c:"b-teal"},{t:"Google",c:"b-green"}],an:{h:"Kubernetes is like an air traffic control system for your containers.",b:"Docker gives you planes (containers). Kubernetes is the control tower — it decides where each lands, reroutes if a runway is busy, brings in more planes at rush hour, and parks them when quiet. Everything runs safely without manual intervention."},bl:[{n:"Google Search infrastructure",d:"Billions of daily queries routed across thousands of servers"},{n:"Pokemon GO launch",d:"Scaled from thousands to tens of millions of users in days"},{n:"Goldman Sachs trading systems",d:"Zero-downtime financial workloads with instant failover"},{n:"Spotify global delivery",d:"Microservices for playlists, search, and streaming at planetary scale"}],kw:["Pods & Deployments","Horizontal Pod Autoscaling","Helm charts","Service mesh (Istio/Linkerd)"],qs:["How does a Kubernetes Deployment differ from a bare Pod \u2014 why does it matter in production?","Walk me through a zero-downtime rolling deployment and rollback strategy in Kubernetes.","What is the difference between a ConfigMap and a Secret in Kubernetes?","How does Kubernetes handle service discovery \u2014 how do pods find each other?","What is a Kubernetes Ingress and how does it differ from a LoadBalancer service?","How have you used Horizontal Pod Autoscaling \u2014 what metrics drove the scaling decision?"],code:"replicas: 3\ncontainers:\n  - name: api\n    image: myapp:v2\n    resources:\n      limits:\n        memory: \"256Mi\"",pl:"Tells Kubernetes: <strong>run 3 identical copies of our app</strong>, each capped at 256MB RAM. If one crashes it is automatically replaced. If traffic spikes it can spin up more. No human intervention needed."},
aws:{cat:"DevOps & Cloud",name:"AWS",tl:"Amazon's cloud platform — the world's largest on-demand computing, storage, and AI services",icon:"ti-cloud",ibg:"#fdf0d8",icl:"#8a5200",badges:[{t:"Cloud",c:"b-amber"},{t:"Infrastructure",c:"b-blue"},{t:"DevOps",c:"b-teal"},{t:"Amazon",c:"b-green"}],an:{h:"AWS is like renting a city's infrastructure instead of building your own.",b:"Instead of buying servers and building data centres, AWS lets you rent exactly what you need — for an hour or a year. Need more power for Black Friday? Turn a dial up. Sale over? Turn it back. Pay only for what you use."},bl:[{n:"Netflix streaming",d:"S3 and CloudFront deliver video to 260M+ subscribers globally"},{n:"Airbnb's entire backend",d:"Databases, compute, and storage for 100M+ guests on AWS"},{n:"NASA Mars rover data",d:"Petabytes of space mission telemetry stored and analysed"},{n:"Zoom video infrastructure",d:"Elastic compute that scaled overnight in 2020"}],kw:["EC2 / Lambda (serverless)","S3 object storage","IAM & security policies","Auto-scaling & load balancing"],qs:["What is the difference between EC2 and Lambda \u2014 what criteria decide which fits a given workload?","How have you approached cost optimisation on AWS \u2014 what changes made the biggest real-world difference?","What is the difference between an S3 bucket policy and an IAM policy?","How does AWS VPC work \u2014 what are subnets, route tables, and security groups?","What is the difference between RDS and Aurora \u2014 when would you choose each?","How have you implemented a disaster recovery strategy on AWS?"],code:"import boto3\ns3 = boto3.client('s3')\ns3.upload_file(\n  'report.pdf', 'my-bucket',\n  'reports/2024/report.pdf'\n)",pl:"Uploads a PDF to <strong>AWS cloud storage (S3)</strong> — globally accessible, replicated across data centres, handles millions of downloads without breaking."},
gcp:{cat:"DevOps & Cloud",name:"GCP",tl:"Google Cloud Platform — best-in-class for data analytics, AI/ML, and the original home of Kubernetes",icon:"ti-brand-google",ibg:"#e8f1fb",icl:"#1558a0",badges:[{t:"Cloud",c:"b-blue"},{t:"Google",c:"b-green"},{t:"AI/ML",c:"b-purple"},{t:"BigQuery",c:"b-amber"}],an:{h:"GCP is like renting the same infrastructure that runs Google Search and YouTube.",b:"AWS is the biggest cloud; GCP is the smartest for data and AI. BigQuery can process petabytes using the same infrastructure Google uses for Search logs — available to rent by the minute."},bl:[{n:"Spotify's data platform",d:"BigQuery processes billions of streaming events daily"},{n:"Twitter's ML pipeline",d:"Large-scale model training on Google's TPU infrastructure"},{n:"HSBC fraud detection",d:"Real-time transaction scoring using Vertex AI and BigQuery"},{n:"Snapchat's infrastructure",d:"Storage, compute, and ML services all on GCP"}],kw:["BigQuery (data warehouse)","Vertex AI / AutoML","GKE (Kubernetes Engine)","Pub/Sub messaging"],qs:["What is the difference between BigQuery and Cloud SQL on GCP \u2014 when would you use each?","Have you used Vertex AI or AutoML \u2014 what problem were you solving?","How does GCP's IAM model work \u2014 what is the difference between roles, members, and policies?","What is Pub/Sub on GCP and how does it differ from Kafka?","How have you used Cloud Run vs GKE \u2014 what drove the architectural choice?","How does GCP's billing model work \u2014 what strategies have you used to control costs?"],code:"from google.cloud import bigquery\nclient = bigquery.Client()\nresult = client.query(\n  'SELECT * FROM `dataset.users` LIMIT 100'\n).result()",pl:"Runs a <strong>SQL query against BigQuery</strong> — Google's data warehouse that can scan petabytes in seconds. Same interface works for 100 rows or 100 billion."},
azure:{cat:"DevOps & Cloud",name:"Azure",tl:"Microsoft's cloud platform — dominant in enterprise and Microsoft-ecosystem organisations",icon:"ti-brand-azure",ibg:"#e8f1fb",icl:"#1558a0",badges:[{t:"Cloud",c:"b-blue"},{t:"Microsoft",c:"b-purple"},{t:"Enterprise",c:"b-teal"},{t:"Hybrid",c:"b-amber"}],an:{h:"Azure is like AWS but speaks fluent Microsoft.",b:"If your organisation runs Windows Server, Active Directory, or Office 365, Azure slots in with zero friction. It is the default cloud for enterprises already in the Microsoft ecosystem — seamless identity, licensing, and compliance integration."},bl:[{n:"Xbox Live infrastructure",d:"Gaming services and matchmaking for 100M+ players"},{n:"LinkedIn (Microsoft-owned)",d:"Professional network backend running entirely on Azure"},{n:"UK National Health Service",d:"Patient systems and clinical data migrated to Azure"},{n:"Volkswagen Group",d:"Connected car platform processing data from 5M+ vehicles"}],kw:["Azure Functions (serverless)","Azure DevOps (CI/CD)","Active Directory / Entra ID","AKS (Kubernetes Service)"],qs:["How have you used Azure DevOps for CI/CD pipelines \u2014 what stages did your pipeline include?","What is Managed Identity in Azure and why is it preferable to storing service credentials?","What is the difference between Azure App Service and Azure Functions?","How does Azure Active Directory (Entra ID) integrate with application authentication?","What is Azure Service Bus and how does it compare to Azure Event Hubs?","How have you implemented infrastructure as code on Azure \u2014 ARM templates, Bicep, or Terraform?"],code:"az functionapp create \\\n  --resource-group myRG \\\n  --consumption-plan-location eastus \\\n  --name myFunc \\\n  --runtime python",pl:"Creates a <strong>serverless function app on Azure</strong>. Consumption plan means you pay only when the function runs — no idle server costs, no servers to manage."},
terraform:{cat:"DevOps & Cloud",name:"Terraform",tl:"Infrastructure as Code — define cloud resources in config files and provision them automatically",icon:"ti-brand-terraform",ibg:"#efedfd",icl:"#4a3db0",badges:[{t:"DevOps",c:"b-purple"},{t:"IaC",c:"b-blue"},{t:"HashiCorp",c:"b-teal"},{t:"Multi-cloud",c:"b-green"}],an:{h:"Terraform is like an architectural blueprint for cloud infrastructure.",b:"Instead of clicking through cloud dashboards manually — error-prone and unrepeatable — you write a blueprint file. Terraform reads it and builds exactly that infrastructure, and can recreate it identically in any environment on demand."},bl:[{n:"Coinbase infrastructure",d:"Entire cloud infrastructure version-controlled via Terraform"},{n:"Stripe's multi-region setup",d:"Identical infrastructure across AWS regions for redundancy"},{n:"GitHub's cloud platform",d:"Thousands of cloud resources managed as code in git repos"},{n:"Airbnb cloud governance",d:"Consistent, auditable resource provisioning across teams"}],kw:["HCL (HashiCorp Config Language)","State management","Modules & workspaces","Plan / Apply / Destroy lifecycle"],qs:["How do you handle Terraform state in a team environment \u2014 what problems arise?","What is the difference between terraform plan and terraform apply?","What is a Terraform module and how have you structured them in a real project?","How do you manage secrets in Terraform \u2014 what do you avoid putting in state?","What is the difference between terraform import and writing a resource from scratch?","How have you handled Terraform workspace management across dev, staging, and production?"],code:"resource \"aws_s3_bucket\" \"data\" {\n  bucket = \"my-data-bucket\"\n  tags = {\n    Environment = \"production\"\n  }\n}",pl:"Defines an <strong>AWS S3 storage bucket as code</strong>. Run terraform apply and the bucket gets created. Check this into git and your infrastructure is versioned, reviewable, and reproducible by anyone."},
kafka:{cat:"DevOps & Cloud",name:"Apache Kafka",tl:"A distributed event streaming platform processing millions of events per second — backbone of real-time data pipelines",icon:"ti-arrows-split",ibg:"#fdf0d8",icl:"#8a5200",badges:[{t:"Streaming",c:"b-amber"},{t:"Events",c:"b-blue"},{t:"Real-time",c:"b-teal"},{t:"Apache",c:"b-red"}],an:{h:"Kafka is like a postal sorting centre for real-time data.",b:"When millions of events happen simultaneously — purchases, clicks, sensor readings — you need a system that accepts all of them, orders them, and lets multiple downstream systems consume at their own pace. Kafka is that sorting centre: durable, ordered, replayable."},bl:[{n:"LinkedIn activity streams",d:"Processing billions of activity events from 900M users daily"},{n:"Uber real-time analytics",d:"Trip events, driver location, and pricing signals at millions/second"},{n:"NYT publishing pipeline",d:"Article events triggering CDN purges and push notifications"},{n:"Adidas e-commerce events",d:"Inventory updates, order events, and loyalty point triggers"}],kw:["Topics, partitions & offsets","Consumer groups","Kafka Streams","Schema registry (Avro/Protobuf)"],qs:["What is the difference between Kafka and a traditional message queue like RabbitMQ?","How do you ensure message ordering in Kafka across multiple consumer instances?","What is the difference between a Kafka consumer group and a standalone consumer?","How does Kafka handle message retention \u2014 what happens when a consumer falls behind?","What is Kafka Streams and how does it differ from using a consumer to process and re-publish?","How have you monitored a Kafka cluster in production \u2014 what metrics matter most?"],code:"producer.send(new ProducerRecord<>(\n  \"orders\", orderId, orderJson\n));\nconsumer.subscribe(List.of(\"orders\"));",pl:"The producer sends an <strong>order event to the orders topic</strong>. Multiple consumer services (warehouse, email, analytics) can all read from the same topic independently — at their own pace, replaying from any point."},
cicd:{cat:"DevOps & Cloud",name:"CI/CD",tl:"Continuous Integration & Deployment — automating the journey from code commit to production safely",icon:"ti-git-merge",ibg:"#e0f4ee",icl:"#0d6e54",badges:[{t:"DevOps",c:"b-teal"},{t:"Automation",c:"b-blue"},{t:"GitHub Actions",c:"b-green"},{t:"Jenkins",c:"b-amber"}],an:{h:"CI/CD is like an automated quality control line in a factory.",b:"Without CI/CD, releasing software is like hand-crafting each product — slow, inconsistent, error-prone. CI/CD is the automated assembly line: every code change triggers tests, builds, and deployment steps. Bad code is caught before users ever see it."},bl:[{n:"GitHub's own deployments",d:"GitHub deploys to production hundreds of times per day via Actions"},{n:"Netflix canary releases",d:"New code released to 1% of users first — problems caught before full rollout"},{n:"Google's monorepo pipelines",d:"Thousands of automated builds per hour across hundreds of teams"},{n:"Shopify deploy pipeline",d:"Zero-downtime deployments handling millions of stores"}],kw:["GitHub Actions / GitLab CI","Pipeline stages (build/test/deploy)","Canary & blue-green deployments","Artifact management & rollback"],qs:["Walk me through a CI/CD pipeline you built end-to-end \u2014 what stages did it have and what tools?","How do you handle secrets and environment variables securely in a CI/CD pipeline?","What is the difference between a blue-green deployment and a canary deployment?","How have you implemented automated rollback in a deployment pipeline?","What is the difference between continuous delivery and continuous deployment?","How do you manage database schema changes safely as part of a CI/CD pipeline?"],code:"on: push:\n  branches: [main]\njobs:\n  deploy:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n      - run: npm test\n      - run: npm run deploy",pl:"A <strong>GitHub Actions pipeline</strong>: every push to main automatically checks out code, runs tests, and deploys. If tests fail, deployment stops — no human required."},
ansible:{cat:"DevOps & Cloud",name:"Ansible",tl:"An agentless automation tool for configuring servers, deploying apps, and orchestrating IT tasks at scale",icon:"ti-settings-automation",ibg:"#fdeaea",icl:"#9b2222",badges:[{t:"DevOps",c:"b-red"},{t:"Automation",c:"b-blue"},{t:"Red Hat",c:"b-amber"},{t:"Agentless",c:"b-teal"}],an:{h:"Ansible is like a recipe book that configures your servers automatically.",b:"Manually SSHing into 50 servers to install software is chaos. Ansible lets you write a playbook — a recipe — describing the desired state, and it applies it to every server simultaneously. No agents to install, no special software required."},bl:[{n:"NASA's IT automation",d:"Configuring and maintaining servers across mission systems"},{n:"Rackspace cloud provisioning",d:"Automatically provisioning and configuring customer cloud servers"},{n:"Deutsche Telekom's network",d:"Automating network device configuration across Europe"},{n:"Cisco's DevOps pipelines",d:"Network automation and infrastructure configuration management"}],kw:["Playbooks & roles","YAML configuration","Inventory management","Idempotency"],qs:["What is idempotency in Ansible and why does it matter for production automation?","How have you structured Ansible roles for a large infrastructure?","What is the difference between an Ansible role and a playbook?","How do you manage secrets and sensitive variables in Ansible?","What is Ansible's inventory and how have you managed dynamic inventories?","How have you tested Ansible playbooks before applying them to production?"],code:"- name: Install and start Nginx\n  hosts: webservers\n  tasks:\n    - name: Install nginx\n      apt: name=nginx state=present\n    - name: Start nginx\n      service: name=nginx state=started",pl:"A playbook that <strong>installs and starts Nginx</strong> on all servers in the webservers group simultaneously. Run it once, run it a hundred times — the result is always the same, with zero manual SSH sessions."},
tensorflow:{cat:"AI & Data Science",name:"TensorFlow",tl:"Google's open-source framework for building, training, and deploying machine learning models at scale",icon:"ti-brain",ibg:"#fdeaea",icl:"#9b2222",badges:[{t:"AI/ML",c:"b-red"},{t:"Google",c:"b-amber"},{t:"Deep learning",c:"b-purple"},{t:"Python",c:"b-green"}],an:{h:"TensorFlow is like a gym for teaching computers to think.",b:"You don't program answers directly. You show the computer thousands of labelled examples and TensorFlow provides the machinery to train a neural network until it recognises patterns on its own."},bl:[{n:"Google Photos recognition",d:"Identifying faces, objects, and scenes across billions of photos"},{n:"YouTube recommendations",d:"Predicting which video you will click next"},{n:"Medical image diagnosis",d:"Detecting tumours in MRI scans with radiologist-level accuracy"},{n:"Google Translate",d:"Neural translation across 100+ languages in real time"}],kw:["Neural networks / deep learning","Model training & inference","Keras (high-level API)","GPU / TPU acceleration"],qs:["How do you prevent overfitting when training a model \u2014 which regularisation techniques have you used?","Walk me through training, validation, and test dataset splits \u2014 why does mixing them up matter?","What is the difference between a dense layer and a convolutional layer in a neural network?","How have you optimised TensorFlow model inference for production latency?","What is TensorFlow Serving and how have you used it to deploy a model?","What is the difference between eager execution and graph execution in TensorFlow?"],code:"model = tf.keras.Sequential([\n  Dense(128, activation='relu'),\n  Dense(10, activation='softmax')\n])\nmodel.compile(optimizer='adam',\n  loss='sparse_categorical_crossentropy')",pl:"Builds a <strong>neural network brain</strong>: the first layer finds patterns, the second picks one of 10 answers. Prepped to learn using Adam optimiser — like choosing the best study strategy before an exam."},
pytorch:{cat:"AI & Data Science",name:"PyTorch",tl:"Meta's deep learning framework — the favourite of AI researchers for flexibility and Pythonic design",icon:"ti-flame",ibg:"#fdeaea",icl:"#9b2222",badges:[{t:"AI/ML",c:"b-red"},{t:"Meta",c:"b-blue"},{t:"Research",c:"b-purple"},{t:"Python",c:"b-green"}],an:{h:"PyTorch is like modelling clay compared to TensorFlow's rigid blueprint.",b:"TensorFlow originally worked like a rigid blueprint — define everything first, then run. PyTorch lets you build and change models dynamically. This made it beloved by researchers who iterate constantly. Today PyTorch powers most cutting-edge AI research."},bl:[{n:"ChatGPT's underlying model",d:"OpenAI trains GPT models using PyTorch infrastructure"},{n:"Tesla Autopilot",d:"Real-time object detection and path planning neural networks"},{n:"Meta's content ranking",d:"Models ranking posts and recommendations across Facebook"},{n:"Stability AI image generation",d:"Stable Diffusion and generative AI models trained in PyTorch"}],kw:["Dynamic computation graphs","torch.nn (model layers)","Gradient descent / backpropagation","CUDA GPU acceleration"],qs:["What is the difference between PyTorch's eager mode and using torch.compile?","How have you managed GPU memory efficiently when training large models?","What is the difference between model.train() and model.eval() in PyTorch?","How does backpropagation work in PyTorch \u2014 what does loss.backward() actually do?","How have you used PyTorch DataLoader \u2014 what is the role of num_workers and pin_memory?","What is mixed precision training and how does it speed up model training in PyTorch?"],code:"model = nn.Sequential(\n  nn.Linear(784, 128),\n  nn.ReLU(),\n  nn.Linear(128, 10)\n)\nloss = criterion(model(x), y)\nloss.backward()",pl:"Defines a neural network, runs input x through it, calculates how wrong the prediction was, then <strong>backpropagates the error</strong> — adjusting weights to do better. Repeated millions of times, this is how AI learns."},
huggingface:{cat:"AI & Data Science",name:"Hugging Face",tl:"The GitHub of AI — hosting 500K+ pre-trained models and the go-to library for NLP and generative AI",icon:"ti-robot",ibg:"#fdf0d8",icl:"#8a5200",badges:[{t:"AI/ML",c:"b-amber"},{t:"NLP",c:"b-blue"},{t:"Pre-trained models",c:"b-teal"},{t:"Open Source",c:"b-green"}],an:{h:"Hugging Face is like a library of pre-built AI brains you can borrow and fine-tune.",b:"Training an AI model from scratch takes millions of dollars and months of compute. Hugging Face hosts thousands of pre-trained models you can download and fine-tune on your own data in hours. It dramatically lowers the barrier to deploying production AI."},bl:[{n:"Every AI startup's NLP pipeline",d:"Sentiment analysis, translation, and summarisation using Transformers"},{n:"Bloomberg's financial AI",d:"Fine-tuned models for financial document analysis"},{n:"Grammarly's writing assistant",d:"Grammar and style models built on transformer architecture"},{n:"Enterprise document intelligence",d:"Information extraction and classification at scale"}],kw:["Transformers library","Fine-tuning pre-trained models","Inference Endpoints","Model Hub & Spaces"],qs:["What is the difference between fine-tuning a model and using it zero-shot?","How have you used Hugging Face Transformers in a production NLP pipeline?","What is the difference between an encoder-only, decoder-only, and encoder-decoder model?","How does tokenisation work in transformer models \u2014 what is the impact of tokeniser choice?","What is LoRA (Low-Rank Adaptation) and why is it used for fine-tuning large models?","How have you deployed a Hugging Face model to production \u2014 what serving infrastructure did you use?"],code:"from transformers import pipeline\n\nsentiment = pipeline('sentiment-analysis')\nresult = sentiment('I love this product!')\n# [{'label': 'POSITIVE', 'score': 0.9998}]",pl:"Downloads a pre-trained sentiment model and classifies a sentence — <strong>no training required</strong langchain:{cat:"AI & Data Science",name:"LangChain",tl:"A framework for building LLM-powered apps — connecting AI models to tools, memory, and your data",icon:"ti-link",ibg:"#efedfd",icl:"#4a3db0",badges:[{t:"AI/LLM",c:"b-purple"},{t:"RAG",c:"b-blue"},{t:"Agents",c:"b-teal"},{t:"Python",c:"b-green"}],an:{h:"LangChain is like a conductor for an AI orchestra.",b:"A language model alone is brilliant but limited. LangChain connects it to a search engine, a database, a calculator, and memory — so the AI can look things up, remember context, and take multi-step actions. It turns a chatbot into an agent."},bl:[{n:"Enterprise document Q&A",d:"RAG systems answering questions using your company's internal docs"},{n:"AI customer support agents",d:"Bots that look up order history, escalate tickets, and take actions"},{n:"Code review assistants",d:"Agents that pull diffs, run tests, and give feedback autonomously"},{n:"Research summarisation tools",d:"Agents that search the web, read papers, and produce briefings"}],kw:["RAG (Retrieval-Augmented Generation)","Chains & agents","Vector stores (Pinecone, Chroma)","Memory & context management"],qs:["What is the difference between a LangChain chain and an agent \u2014 when would you use each?","How have you implemented RAG \u2014 what chunking strategy and embedding model did you choose?","What is the difference between a vector store retriever and a keyword retriever in LangChain?","How do you evaluate the quality of a RAG pipeline \u2014 what metrics do you use?","What are LangChain tools and how do you use them in an agent workflow?","How have you handled conversation memory in a LangChain chat application?"],code:"retriever = db.as_retriever()\nchain = RetrievalQA.from_chain_type(\n  llm=ChatOpenAI(),\n  retriever=retriever\n)\nchain.run('What is our refund policy?')",pl:"Creates a <strong>RAG question-answering system</strong>: the retriever finds relevant company docs, the LLM reads them and answers. The AI knows your docs with spark:{cat:"AI & Data Science",name:"Apache Spark",tl:"A distributed computing engine for processing massive datasets across clusters — the standard for big data",icon:"ti-bolt",ibg:"#fdf0d8",icl:"#8a5200",badges:[{t:"Data Engineering",c:"b-amber"},{t:"Distributed",c:"b-red"},{t:"Big Data",c:"b-blue"},{t:"Apache",c:"b-teal"}],an:{h:"Spark is like splitting a mountain of paperwork across an entire office floor.",b:"If you have a billion rows of data, one computer would take days. Spark splits the work across hundreds of machines simultaneously — each handles a slice, results are merged. What took days takes minutes."},bl:[{n:"Netflix batch recommendations",d:"Nightly jobs processing viewing history across 260M subscribers"},{n:"Uber's pricing models",d:"Processing billions of trip records to train surge pricing"},{n:"CERN particle accelerator",d:"Processing petabytes of collision data from the LHC"},{n:"JPMorgan risk analytics",d:"Portfolio risk calculations across millions of financial instruments"}],kw:["RDDs & DataFrames","PySpark (Python API)","Spark SQL","Spark Streaming"],qs:["What is the difference between a narrow and wide transformation in Spark \u2014 why does it affect performance?","How have you tuned Spark jobs in production \u2014 what metrics guided your decisions?","What is the difference between RDDs, DataFrames, and Datasets in Spark?","What is Spark's lazy evaluation model and how does it affect how you write transformations?","How do you handle data skew in a Spark job?","What is the difference between Spark batch processing and Spark Structured Streaming?"],code:"df = spark.read.parquet('s3://events')\nresult = (\n  df.filter(df.event == 'purchase')\n    .groupBy('user_id')\n    .agg(count('*').alias('total'))\n)\nresult.write.parquet('s3://output')",pl:"Reads billions of events, <strong>filters for purchases only</strong>, counts each user's total, and writes results back — distributed across a cluster all working in parallel."},
dbt:{cat:"AI & Data Science",name:"dbt",tl:"Data Build Tool — transforms raw data in your warehouse using SQL with software engineering best practices",icon:"ti-database",ibg:"#fdf0d8",icl:"#8a5200",badges:[{t:"Data Engineering",c:"b-amber"},{t:"SQL",c:"b-blue"},{t:"Analytics",c:"b-teal"},{t:"Open Source",c:"b-green"}],an:{h:"dbt is like version control for your data transformations.",b:"Before dbt, data transformations were tangled SQL scripts nobody could maintain. dbt applies software engineering practices — version control, testing, documentation, modularity — to SQL transformations. Data teams can now work like software engineers."},bl:[{n:"Spotify's analytics layer",d:"Transforming streaming event data into business metrics"},{n:"GitLab's self-service analytics",d:"Business teams querying clean, tested data models"},{n:"JetBlue's data warehouse",d:"Flight operations data transformed into actionable analytics"},{n:"Greenhouse recruiting platform",d:"Hiring funnel metrics and candidate pipeline analytics"}],kw:["Models & materializations","Tests & documentation","Jinja templating in SQL","dbt Cloud vs dbt Core"],qs:["What is the difference between a dbt model and a view \u2014 when would you use each materialisation?","How do you write and run tests in dbt \u2014 what types of data quality checks have you implemented?","What is the difference between a dbt source and a dbt model?","How do you manage dbt project structure across a large data team?","What are dbt macros and Jinja templating \u2014 can you give a real example of where you used them?","How do you handle incremental models in dbt \u2014 what are the trade-offs vs full refresh?"],code:"-- models/customer_orders.sql\nSELECT\n  c.id,\n  c.name,\n  COUNT(o.id) AS total_orders\nFROM {{ ref('customers') }} c\nLEFT JOIN {{ ref('orders') }} o ON o.customer_id = c.id\nGROUP BY 1, 2",pl:"A dbt model is just <strong>a SQL SELECT statement</strong>. The {{ ref() }} function references other models, creating a dependency graph. dbt runs them in the right order and materialises the result in your warehouse."},
swift:{cat:"Mobile",name:"Swift",tl:"Apple's modern language for building iOS, macOS, watchOS, and tvOS applications natively",icon:"ti-brand-swift",ibg:"#fdf0d8",icl:"#8a5200",badges:[{t:"Mobile",c:"b-amber"},{t:"iOS/macOS",c:"b-red"},{t:"Apple",c:"b-blue"},{t:"2014",c:"b-green"}],an:{h:"Swift is Objective-C rebuilt from scratch by modern engineers.",b:"Apple's original iOS language was powerful but verbose and error-prone. Swift was redesigned in 2014 — faster, safer, and far more readable. Learning Swift is the only path to building native iOS and macOS apps."},bl:[{n:"Airbnb iOS app",d:"Native property search, booking, and host management"},{n:"Lyft's driver and rider apps",d:"Real-time GPS tracking, matching, and payments on iOS"},{n:"LinkedIn iOS app",d:"Professional network, messaging, and personalised feed"},{n:"Apple's own apps",d:"Safari, Mail, Photos, and App Store — all written in Swift"}],kw:["SwiftUI (declarative UI)","Combine (reactive programming)","Core Data (local persistence)","Xcode & TestFlight"],qs:["What is the difference between SwiftUI and UIKit \u2014 when would you still reach for UIKit?","How do you handle memory management in Swift \u2014 what is the role of weak and unowned references?","What is the difference between a struct and a class in Swift \u2014 when do you prefer each?","How does Swift's Combine framework work \u2014 how have you used it for reactive programming?","What is Swift concurrency (async/await and actors) and how does it improve on completion handlers?","How have you written unit tests in Swift \u2014 what is the role of XCTest?"],code:"struct ContentView: View {\n  @State var name = \"World\"\n  var body: some View {\n    Text(\"Hello, \\(name)!\")\n      .font(.title)\n  }\n}",pl:"A <strong>SwiftUI screen declaration</strong>: when name changes, the Text updates automatically. You describe what should appear, not how to draw it step by step."},
kotlin:{cat:"Mobile",name:"Kotlin",tl:"The modern language for Android development — concise, null-safe, and fully interoperable with Java",icon:"ti-brand-kotlin",ibg:"#efedfd",icl:"#4a3db0",badges:[{t:"Mobile",c:"b-purple"},{t:"Android",c:"b-green"},{t:"JetBrains",c:"b-blue"},{t:"JVM",c:"b-amber"}],an:{h:"Kotlin is Java with a safety net and a spell-checker.",b:"Java works but is verbose and error-prone. Kotlin compiles to the same bytecode, cuts boilerplate dramatically, and makes null pointer exceptions — Java's most notorious bug — impossible by design."},bl:[{n:"Pinterest Android app",d:"Visual discovery feed and pin boards on Android"},{n:"Uber Eats Android",d:"Food delivery ordering, tracking, and payment flow"},{n:"Trello mobile",d:"Kanban board management on Android devices"},{n:"Google's own Android apps",d:"Google Maps, Drive, and Chrome are largely written in Kotlin"}],kw:["Coroutines (async/await)","Jetpack Compose (UI)","Extension functions","Null safety (? and !!)"],qs:["How do Kotlin coroutines differ from threads \u2014 what problems do they solve more elegantly?","What is the difference between val and var in Kotlin \u2014 why does it matter for immutability?","What are Kotlin extension functions and where have you used them in a real project?","What is the difference between a data class and a regular class in Kotlin?","How does Jetpack Compose differ from XML-based Android UI \u2014 what are the advantages?","How have you handled dependency injection in an Android app \u2014 Hilt, Koin, or manual DI?"],code:"data class User(val name: String, val age: Int)\n\nval adults = users\n  .filter { it.age >= 18 }\n  .map { it.name }",pl:"Defines a <strong>User data class</strong> then filters for adults and extracts their names in two lines. Kotlin's concise functional style replaces dozens of lines of equivalent Java."},
flutter:{cat:"Mobile",name:"Flutter",tl:"Google's UI toolkit for building natively compiled apps for mobile, web, and desktop from one codebase",icon:"ti-brand-flutter",ibg:"#e0f4ee",icl:"#0d6e54",badges:[{t:"Mobile",c:"b-teal"},{t:"Cross-platform",c:"b-blue"},{t:"Google",c:"b-green"},{t:"Dart",c:"b-amber"}],an:{h:"Flutter is like a master painter who speaks every platform's language.",b:"Normally you build one iOS app in Swift and another Android app in Kotlin — double the work. Flutter uses its own rendering engine to draw pixels directly on any platform, so one codebase produces native-feeling apps for iOS, Android, web, and desktop."},bl:[{n:"Google Pay",d:"Payment UI across iOS and Android from a single codebase"},{n:"BMW app",d:"Connected car companion app built cross-platform in Flutter"},{n:"eBay Motors",d:"Vehicle listing, search, and bidding on iOS and Android"},{n:"Alibaba Xianyu",d:"Second-hand marketplace serving 50M+ users on both platforms"}],kw:["Dart language","Widget tree (stateful/stateless)","Hot reload / hot restart","Platform channels (native API access)"],qs:["How does Flutter's widget tree differ from React's component tree?","When would you choose Flutter over React Native \u2014 what factors drive the decision?","What is the difference between a StatelessWidget and a StatefulWidget in Flutter?","How does Flutter's rendering engine work \u2014 how does it achieve native-like performance?","How have you used platform channels in Flutter to access native device APIs?","How do you manage state in a large Flutter app \u2014 Provider, Riverpod, Bloc, or GetX?"],code:"ElevatedButton(\n  onPressed: () => setState(() { count++; }),\n  child: Text('Count: $count'),\n)",pl:"A <strong>Flutter button widget</strong>: tap it and the count increments, triggering a UI rebuild. In Flutter everything is a widget — buttons, padding, and layout rules all compose into a tree."},
reactnative:{cat:"Mobile",name:"React Native",tl:"Meta's framework for building native iOS and Android apps using React and JavaScript",icon:"ti-brand-react-native",ibg:"#e0f4ee",icl:"#0d6e54",badges:[{t:"Mobile",c:"b-teal"},{t:"JavaScript",c:"b-amber"},{t:"Meta",c:"b-blue"},{t:"Cross-platform",c:"b-green"}],an:{h:"React Native is a universal translator between JavaScript and native mobile.",b:"You write components in React — but instead of HTML, React Native translates them into real native iOS and Android components. Business logic is shared; UI elements are genuinely native, not a web view in a wrapper."},bl:[{n:"Facebook & Instagram",d:"Core social media apps built on React Native"},{n:"Shopify mobile apps",d:"Merchant dashboard and shop management on iOS and Android"},{n:"Discord mobile",d:"Real-time chat, voice, and server management"},{n:"Walmart app",d:"E-commerce, inventory, and self-checkout functionality"}],kw:["JSX components (native mapping)","React Navigation","Native modules (bridging)","Expo (managed workflow)"],qs:["What is the difference between React Native's old Bridge architecture and the new JSI/Fabric?","When would you use Expo versus a bare React Native setup \u2014 what are the trade-offs?","How have you handled platform-specific code in React Native \u2014 Platform.OS or separate files?","How do you debug performance issues in a React Native app?","How have you used React Native's navigation libraries \u2014 React Navigation vs Expo Router?","What is the difference between React Native and a WebView-based hybrid app?"],code:"const Button = () => (\n  <TouchableOpacity\n    style={styles.btn}\n    onPress={() => Alert.alert('Hi!')}>\n    <Text>Press me</Text>\n  </TouchableOpacity>\n);",pl:"A <strong>native mobile button</strong> in JavaScript. TouchableOpacity maps to a real iOS/Android pressable element — not a web button. Alert shows a native system dialog."},
jest:{cat:"Testing & Security",name:"Jest",tl:"Meta's JavaScript testing framework — the standard for unit and integration testing React and Node apps",icon:"ti-test-pipe",ibg:"#fdf0d8",icl:"#8a5200",badges:[{t:"Testing",c:"b-amber"},{t:"JavaScript",c:"b-blue"},{t:"Meta",c:"b-green"},{t:"Unit tests",c:"b-teal"}],an:{h:"Jest is like a robot QA tester that never gets tired.",b:"Manual testing is slow and forgets edge cases. Jest runs hundreds of test scenarios in seconds on every code change — catching regressions before they reach users, working around the clock with perfect recall."},bl:[{n:"React component suites",d:"Testing that buttons, forms, and UI states behave correctly"},{n:"Node.js API coverage",d:"Verifying endpoints return correct data and handle errors"},{n:"Snapshot testing",d:"Detecting unintended UI changes across a component library"},{n:"Mock-heavy integration tests",d:"Testing services in isolation by mocking external dependencies"}],kw:["Unit & integration testing","Mocking & spying","Snapshot testing","Code coverage reporting"],qs:["What is the difference between unit, integration, and end-to-end tests \u2014 how did you balance these?","How do you mock external APIs or databases in Jest tests without hitting real services?","What is the difference between jest.fn(), jest.spyOn(), and jest.mock()?","How have you used snapshot testing in Jest \u2014 what are the risks of over-relying on snapshots?","How do you measure and enforce code coverage in a Jest test suite?","What is the difference between beforeEach and beforeAll in Jest \u2014 when would you use each?"],code:"test('adds correctly', () => {\n  expect(add(2, 3)).toBe(5);\n});\n\ntest('handles negatives', () => {\n  expect(add(-1, 1)).toBe(0);\n});",pl:"Two automated tests. Jest runs these instantly on every code change — <strong>if someone breaks the add function later</strong>, these tests fail immediately and block the bad code from reaching production."},
selenium:{cat:"Testing & Security",name:"Selenium",tl:"The original browser automation tool — controls real browsers to test web apps across Chrome, Firefox, and Safari",icon:"ti-test-pipe-2",ibg:"#e6f3e0",icl:"#2d6e18",badges:[{t:"Testing",c:"b-green"},{t:"Automation",c:"b-blue"},{t:"Cross-browser",c:"b-teal"},{t:"E2E",c:"b-amber"}],an:{h:"Selenium is like a robot with eyes that can actually use a web browser.",b:"Selenium literally controls a real browser — clicking buttons, filling forms, reading what appears on screen — exactly like a human user. It can test your app across Chrome, Firefox, and Safari simultaneously."},bl:[{n:"Bank login flow testing",d:"Automated tests ensuring login, MFA, and session handling work"},{n:"E-commerce checkout automation",d:"Testing cart, payment, and confirmation flows on every deploy"},{n:"Cross-browser compatibility",d:"Verifying UI renders correctly across different browsers"},{n:"Regression test suites",d:"Hundreds of automated scenarios run before every major release"}],kw:["WebDriver API","Page Object Model (POM)","Selenium Grid (parallel tests)","Cross-browser testing"],qs:["What is the Page Object Model in Selenium and why is it important for maintainable test suites?","How have you handled flaky tests in Selenium \u2014 what causes flakiness and how do you reduce it?","How do you run Selenium tests in parallel across multiple browsers?","How have you integrated Selenium tests into a CI/CD pipeline?","What is the difference between implicit waits and explicit waits in Selenium?","How have you handled dynamic elements that load asynchronously in Selenium?"],code:"driver = webdriver.Chrome()\ndriver.get('https://app.com/login')\ndriver.find_element(By.ID, 'email').send_keys('user@test.com')\ndriver.find_element(By.ID, 'submit').click()\nassert '/dashboard' in driver.current_url",pl:"Opens Chrome, <strong>navigates to the login page</strong>, fills the email field, clicks submit, and verifies the URL changed to /dashboard — anged to /dashboard — confirming the entire login flow works."},
owasp:{cat:"Testing & Security",name:"OWASP",tl:"Open Web Application Security Project — the gold standard framework for identifying and mitigating web security risks",icon:"ti-shield-lock",ibg:"#fdeaea",icl:"#9b2222",badges:[{t:"Security",c:"b-red"},{t:"Framework",c:"b-blue"},{t:"Open Source",c:"b-green"},{t:"Non-profit",c:"b-amber"}],an:{h:"OWASP Top 10 is like a most-wanted list for security vulnerabilities.",b:"Just as law enforcement publishes most-wanted criminals, OWASP publishes the 10 most critical web security risks. Every security-conscious team uses it as their baseline checklist — patch these and you eliminate most common attack vectors."},bl:[{n:"Enterprise security audits",d:"OWASP Top 10 is the standard benchmark for security reviews"},{n:"Penetration testing scope",d:"Pen testers use OWASP to structure what they test for"},{n:"Developer security training",d:"Security awareness programs use OWASP as their curriculum"},{n:"Compliance requirements",d:"PCI-DSS, ISO 27001, and SOC2 all reference OWASP standards"}],kw:["OWASP Top 10 (SQLi, XSS, IDOR)","Threat modelling","SAST / DAST tools","Penetration testing"],qs:["Walk me through three OWASP Top 10 risks and how a developer would mitigate each one.","What is the difference between SAST and DAST security testing \u2014 when would you use each?","What is a SQL injection attack and how does parameterised querying prevent it?","What is Cross-Site Scripting (XSS) \u2014 what is the difference between reflected and stored XSS?","What is CSRF and how does a CSRF token mitigate it?","What is IDOR (Insecure Direct Object Reference) and how do you prevent it in an API?"],code:"# Vulnerable to SQL Injection:\nquery = f'SELECT * FROM users WHERE id = {user_input}'\n\n# OWASP-safe:\ncursor.execute('SELECT * FROM users WHERE id = ?', (user_input,))",pl:"The first version is <strong>dangerously vulnerable</strong> — malicious input returns every user. The safe version uses parameterised queries — the database treats
