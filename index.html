playwright:{cat:"Testing & Security",name:"Playwright",tl:"Microsoft's modern E2E testing framework — faster than Selenium, more powerful than Cypress for cross-browser testing",icon:"ti-player-play",ibg:"#efedfd",icl:"#4a3db0",badges:[{t:"Testing",c:"b-purple"},{t:"E2E",c:"b-blue"},{t:"Microsoft",c:"b-teal"},{t:"Multi-browser",c:"b-green"}],an:{h:"Playwright is like Cypress but with superpowers for complex scenarios.",b:"Playwright runs tests in Chrome, Firefox, and Safari simultaneously from one codebase. It handles complex scenarios Selenium and Cypress struggle with — multiple tabs, file downloads, iframes, mobile emulation — all out of the box."},bl:[{n:"Microsoft's own products",d:"Playwright was built by Microsoft to test Office and Azure web UIs"},{n:"Adobe Experience Manager",d:"Testing complex CMS editing flows across browsers"},{n:"Shopify theme testing",d:"Cross-browser testing of storefront themes and checkout"},{n:"GitHub web UI tests",d:"Testing code review, PR, and repository management flows"}],kw:["Multi-browser (Chrome/Firefox/Safari)","Parallel test execution","Network interception & mocking","Mobile device emulation"],qs:["What does Playwright offer over Cypress for complex E2E scenarios \u2014 when would you choose it?","How have you structured Playwright tests in a CI/CD pipeline \u2014 what was the execution time?","How does Playwright handle multiple browser contexts and pages simultaneously?","How have you used Playwright's API mocking \u2014 what scenarios does that enable?","What is Playwright's trace viewer and how have you used it to debug failing tests?","How do you run Playwright tests across multiple browsers in parallel in CI?"],code:"await page.goto('/login');\nawait page.fill('#email', 'user@test.com');\nawait page.fill('#password', 'secret');\nawait page.click('[type=submit]');\nawait expect(page).toHaveURL('/dashboard');",pl:"Opens the login page, fills credentials, clicks submit, and <strong>asserts the URL changed to /dashboard</strong>. Playwright tests run in parallel across Chrome, Firefox, and Safari simultaneously."},
graphql:{cat:"APIs",name:"GraphQL",tl:"A query language for APIs that lets clients request exactly the data they need — no more, no less",icon:"ti-api",ibg:"#efedfd",icl:"#4a3db0",badges:[{t:"API",c:"b-purple"},{t:"Meta",c:"b-blue"},{t:"Flexible",c:"b-teal"},{t:"Type-safe",c:"b-green"}],an:{h:"GraphQL is like ordering off a menu you designed yourself.",b:"REST APIs are like set menus — you get what the chef decided. GraphQL lets you order exactly what you want: this field from users, that nested array from their orders, nothing else. Fewer requests, less data over the wire."},bl:[{n:"GitHub's API v4",d:"GitHub's entire developer API is GraphQL — used by millions of integrations"},{n:"Shopify storefront API",d:"E-commerce data queried by custom storefronts"},{n:"Twitter's API layer",d:"Flexible querying of tweet, user, and timeline data"},{n:"The New York Times",d:"Content delivery API powering mobile apps and the website"}],kw:["Schema & type definitions","Queries, mutations & subscriptions","Apollo Client/Server","DataLoader (N+1 prevention)"],qs:["What is the N+1 problem in GraphQL and how do you solve it \u2014 have you used DataLoader?","When would you choose GraphQL over REST \u2014 what specific pain points does it solve?","What is the difference between a query, mutation, and subscription in GraphQL?","How do you handle authorisation in a GraphQL API \u2014 field-level vs resolver-level?","What is schema stitching vs schema federation in GraphQL \u2014 when would you need each?","How have you versioned a GraphQL API \u2014 what is the recommended approach and why?"],code:"query {\n  user(id: \"123\") {\n    name\n    email\n    orders {\n      total\n      status\n    }\n  }\n}",pl:"Asks for a user's name, email, and their order totals and statuses — all in <strong>one network request</strong>. REST would require multiple calls to different endpoints; GraphQL gets everything in one."},
restapi:{cat:"APIs",name:"REST API",tl:"The dominant architectural style for web APIs using HTTP methods and URLs to operate on resources",icon:"ti-arrows-exchange",ibg:"#e8f1fb",icl:"#1558a0",badges:[{t:"API",c:"b-blue"},{t:"HTTP",c:"b-teal"},{t:"Stateless",c:"b-green"},{t:"Universal",c:"b-amber"}],an:{h:"A REST API is like a restaurant menu with verbs.",b:"GET means fetch something, POST means create something, PUT means replace it, DELETE means remove it. These four verbs map to every data operation imaginable. The URL is the address of what you're operating on. Simple, universal, understood by every developer on earth."},bl:[{n:"Twitter's public API",d:"Enabling third-party clients, bots, and analytics tools"},{n:"Stripe payments",d:"REST API processing billions of dollars in payments globally"},{n:"Google Maps API",d:"Location, routing, and places data for thousands of apps"},{n:"OpenWeatherMap",d:"Weather data powering millions of apps and dashboards"}],kw:["HTTP verbs (GET/POST/PUT/DELETE)","Status codes (200/401/404/500)","JSON payloads","Authentication (JWT / OAuth 2.0)"],qs:["What is the difference between authentication and authorisation \u2014 give an example of each.","What HTTP status code would you return for a successful create, a missing resource, and an unauthorised request?","What makes an API truly RESTful \u2014 what constraints define REST?","How do you handle API versioning \u2014 URL path, header, or query parameter \u2014 what are the trade-offs?","What is the difference between PUT and PATCH \u2014 when would you use each?","How do you design pagination in a REST API \u2014 offset vs cursor-based \u2014 what are the trade-offs?"],code:"GET    /users          # list all\nGET    /users/42       # get user 42\nPOST   /users          # create new\nPUT    /users/42       # update user 42\nDELETE /users/42       # delete user 42",pl:"Shows <strong>REST's five core operations</strong> on a users resource. The URL is the noun, the HTTP verb is the action. Every developer instantly understands this pattern regardless of language or framework."},
grpc:{cat:"APIs",name:"gRPC",tl:"Google's high-performance RPC framework — binary protocol used for microservice-to-microservice communication",icon:"ti-arrows-exchange-2",ibg:"#e0f4ee",icl:"#0d6e54",badges:[{t:"API",c:"b-teal"},{t:"Google",c:"b-blue"},{t:"Microservices",c:"b-green"},{t:"Binary",c:"b-amber"}],an:{h:"gRPC is like a private direct phone line compared to REST's postal system.",b:"REST uses HTTP text (JSON) which is human-readable but verbose. gRPC uses binary Protocol Buffers — compact, fast, and with a strict contract. For internal microservice communication where speed matters, gRPC can be 10x faster than REST."},bl:[{n:"Google's internal APIs",d:"Most internal Google services communicate via gRPC"},{n:"Netflix's microservices",d:"Service-to-service communication across hundreds of microservices"},{n:"Dropbox infrastructure",d:"Internal APIs for file sync and metadata services"},{n:"Cockroach DB client protocol",d:"Database client communication using gRPC for performance"}],kw:["Protocol Buffers (protobuf)","Bidirectional streaming","Service definition (.proto files)","HTTP/2 multiplexing"],qs:["What is the difference between gRPC and REST \u2014 when would you choose gRPC for a new service?","How does Protocol Buffer serialisation differ from JSON \u2014 what are the trade-offs?","What are the four types of gRPC service methods \u2014 unary, server streaming, client streaming, bidirectional?","How do you handle backward compatibility when evolving a .proto file?","How does gRPC handle authentication and authorisation in a microservice context?","What is gRPC-gateway and when would you use it?"],code:"service UserService {\n  rpc GetUser (UserRequest)\n    returns (UserResponse);\n  rpc StreamUsers (Empty)\n    returns (stream User);\n}",pl:"This <strong>.proto file defines a service contract</strong>: one method to get a single user, one to stream all users. gRPC generates client and server code in any language from this definition — the contract is enforced at compile time."},
git:{cat:"Tooling",name:"Git",tl:"The universal version control system — tracks every change, enables collaboration, and allows reverting any mistake",icon:"ti-brand-git",ibg:"#fdeaea",icl:"#9b2222",badges:[{t:"Version control",c:"b-red"},{t:"Universal",c:"b-blue"},{t:"Open Source",c:"b-green"},{t:"Linus Torvalds",c:"b-amber"}],an:{h:"Git is like an infinite undo button with a full history of every decision.",b:"Imagine a document that records every change ever made — who made it, when, and why — and lets you go back to any version instantly. Git does this for code. It is why teams of thousands can work on the same codebase without destroying each other's work."},bl:[{n:"Linux kernel development",d:"10,000+ contributors worldwide collaborating via Git"},{n:"Every open-source project",d:"GitHub hosts 420M+ repositories all version-controlled by Git"},{n:"Google's monorepo",d:"Billions of lines of code in one Git-based repository"},{n:"Your team's codebase",d:"Every professional engineering team uses Git — non-negotiably"}],kw:["Branching & merging strategies","Rebase vs merge","Pull requests / code review","Git hooks & workflows (GitFlow/trunk-based)"],qs:["What is the difference between git rebase and git merge \u2014 when would you use each?","How do you handle merge conflicts and what tools do you use?","What is the difference between git reset, git revert, and git restore?","What branching strategies have you worked with \u2014 GitFlow, trunk-based, or feature flags?","How do you use git bisect to find a bug-introducing commit?","What are git hooks and have you used them \u2014 what problems did they solve?"],code:"git checkout -b feature/login\ngit add .\ngit commit -m 'Add login form validation'\ngit push origin feature/login",pl:"Creates an <strong>isolated branch</strong> for the login feature, saves changes with a message, and uploads to the team's shared repository — ready for code review before merging."},
linux:{cat:"Tooling",name:"Linux",tl:"The open-source OS running 96% of the world's servers, all cloud infrastructure, and every Android device",icon:"ti-brand-ubuntu",ibg:"#fdf0d8",icl:"#8a5200",badges:[{t:"OS",c:"b-amber"},{t:"Servers",c:"b-blue"},{t:"Open Source",c:"b-green"},{t:"Foundational",c:"b-teal"}],an:{h:"Linux is like the invisible engine room powering the internet.",b:"You probably never see Linux day-to-day, but it runs the servers behind Google, Amazon, Netflix, and virtually every website you visit. Free, stable, and endlessly configurable — which is why it won the server world."},bl:[{n:"Every cloud provider's servers",d:"AWS, GCP, and Azure all run Linux as the underlying OS"},{n:"Android (all 3B+ devices)",d:"Android is built on the Linux kernel"},{n:"International Space Station",d:"Mission-critical life support systems run on Linux"},{n:"CERN data processing",d:"Particle physics data across thousands of Linux nodes"}],kw:["Bash scripting","Process & memory management","File permissions & security","Systemd / cron jobs"],qs:["How do you diagnose a Linux server running slow \u2014 what commands and tools do you start with?","What is the difference between a process and a thread in Linux?","How do Linux file permissions work \u2014 what do the user, group, and other permission bits mean?","What is the difference between a hard link and a symbolic link in Linux?","How do you use systemd to manage services \u2014 what commands do you use day-to-day?","How have you written a bash script to automate a repetitive system task?"],code:"find /var/log -name '*.log' \\\n  -size +100M \\\n  -exec gzip {} \\;\n\nsystemctl restart nginx",pl:"Finds <strong>log files over 100MB</strong> and compresses them automatically, then restarts Nginx. Typical sysadmin automation — scripting repetitive maintenance to run unattended."},
figma:{cat:"Design & Product",name:"Figma",tl:"The browser-based collaborative design tool where virtually all product UI/UX design happens today",icon:"ti-brand-figma",ibg:"#fdeaea",icl:"#9b2222",badges:[{t:"Design",c:"b-red"},{t:"UI/UX",c:"b-pink"},{t:"Collaboration",c:"b-blue"},{t:"Browser-based",c:"b-teal"}],an:{h:"Figma is like Google Docs but for designing app interfaces.",b:"Before Figma, designers emailed Sketch files around and conflicts were inevitable. Figma runs in the browser so designers and developers collaborate on the same file simultaneously — designers design, developers inspect exact CSS values, all in one place."},bl:[{n:"Every modern app's UI mockup",d:"Virtually all product design happens in Figma today"},{n:"Design systems at scale",d:"Airbnb, GitHub, and Atlassian maintain their design systems in Figma"},{n:"Interactive prototypes",d:"Clickable app demos for user testing without writing code"},{n:"Developer handoff specs",d:"Devs inspect Figma for exact spacing, fonts, and colours"}],kw:["Component libraries & variants","Auto-layout (responsive design)","Figma Dev Mode","Prototyping & user flows"],qs:["How do you structure a Figma component library for a large product team?","What is your handoff workflow from Figma to engineering \u2014 how do you ensure accuracy?","What is the difference between Figma components and instances \u2014 how does overriding work?","How have you used Figma's auto-layout feature to create responsive components?","What is Figma Dev Mode and how does it change the developer workflow?","How do you manage design tokens in Figma and how do they translate to code?"],code:".button {\n  /* Auto-generated by Figma Dev Mode */\n  padding: 12px 24px;\n  border-radius: 8px;\n  background: #1558a0;\n  font-size: 14px;\n  font-weight: 600;\n}",pl:"Figma's Dev Mode <strong>automatically generates CSS</strong> from any design element — developers see exact spacing, colours, and fonts the designer intended. Eliminates the 'that's not what I designed' conversation."},
airflow:{cat:"Data Engineering",name:"Apache Airflow",tl:"A workflow orchestration platform for scheduling, monitoring, and managing complex data pipelines",icon:"ti-wind",ibg:"#e8f1fb",icl:"#1558a0",badges:[{t:"Data Engineering",c:"b-blue"},{t:"Orchestration",c:"b-teal"},{t:"Apache",c:"b-green"},{t:"Python",c:"b-amber"}],an:{h:"Airflow is like a sophisticated alarm clock system for your data pipelines.",b:"A data pipeline might run 50 steps in a specific order, some in parallel, some only after others finish. Airflow schedules and monitors all of this — retrying failed steps, sending alerts, and providing a visual dashboard of what ran, when, and whether it succeeded."},bl:[{n:"Airbnb (Airflow's birthplace)",d:"Airflow was created at Airbnb to orchestrate their data pipelines"},{n:"Twitter's data platform",d:"Scheduling ETL jobs, model training, and reporting pipelines"},{n:"Lyft's analytics engineering",d:"Daily data transformations feeding business intelligence dashboards"},{n:"ING Bank's data platform",d:"Regulatory reporting pipelines run and monitored via Airflow"}],kw:["DAGs (Directed Acyclic Graphs)","Operators & sensors","Task dependencies","Airflow schedulers & executors"],qs:["What is a DAG in Airflow and how does it define dependencies between tasks?","How have you handled failure and retry logic in an Airflow pipeline \u2014 what monitoring did you set up?","What is the difference between the Airflow scheduler and an executor?","What is an Airflow sensor and when would you use one instead of a direct task dependency?","How have you parameterised Airflow DAGs for different environments or dates?","How do you test Airflow DAGs locally before pushing to production?"],code:"with DAG('daily_etl', schedule_interval='@daily') as dag:\n  extract   = PythonOperator(task_id='extract',   python_callable=extract_fn)\n  transform = PythonOperator(task_id='transform', python_callable=transform_fn)\n  load      = PythonOperator(task_id='load',      python_callable=load_fn)\n  extract >> transform >> load",pl:"Defines a <strong>daily pipeline</strong> with three steps: extract data, transform it, load it. The >> operator sets the order — Airflow runs extract first, then transform, then load, retrying failures automatically."},
snowflake:{cat:"Data Engineering",name:"Snowflake",tl:"A cloud data warehouse that separates compute from storage — scalable, multi-cloud, and SQL-based",icon:"ti-snowflake",ibg:"#e8f1fb",icl:"#1558a0",badges:[{t:"Data Warehouse",c:"b-blue"},{t:"Cloud",c:"b-teal"},{t:"SQL",c:"b-green"},{t:"Multi-cloud",c:"b-amber"}],an:{h:"Snowflake is like a data warehouse that grows and shrinks on demand.",b:"Traditional data warehouses required expensive hardware and months of setup. Snowflake runs on AWS, GCP, or Azure and scales compute independently of storage. Need more processing power for month-end reports? Scale up for an hour. Done? Scale back down. Pay per second."},bl:[{n:"DoorDash analytics platform",d:"Petabytes of order, delivery, and driver data analysed in Snowflake"},{n:"Nasdaq market data",d:"Financial market data warehouse serving thousands of analysts"},{n:"Capital One data platform",d:"Centralised analytics warehouse for credit and banking data"},{n:"Instacart's data teams",d:"Grocery delivery data enabling real-time and batch analytics"}],kw:["Virtual warehouses (compute clusters)","Time travel & data cloning","Data sharing across organisations","Snowpark (Python/Java in Snowflake)"],qs:["What is the difference between a Snowflake virtual warehouse and a database \u2014 how do you size one?","How does Snowflake's time travel feature work and when would you use it?","What is Snowflake's zero-copy cloning and what use cases does it enable?","How does Snowflake handle semi-structured data like JSON \u2014 what is the VARIANT type?","What is the difference between Snowflake's compute and storage layers \u2014 why does that separation matter?","How have you optimised Snowflake query costs \u2014 what techniques reduce credit consumption?"],code:"CREATE WAREHOUSE analytics_wh\n  WITH WAREHOUSE_SIZE = 'MEDIUM'\n  AUTO_SUSPEND = 300\n  AUTO_RESUME = TRUE;\n\nSELECT * FROM orders WHERE amount > 1000;",pl:"Creates a <strong>compute cluster (virtual warehouse)</strong> that automatically suspends after 5 minutes of inactivity and resumes when needed. You run standard SQL against it — Snowflake handles all the scaling and maintenance."},
bigquery:{cat:"Data Engineering",name:"BigQuery",tl:"Google's serverless data warehouse — queries petabytes of data in seconds using SQL with no infrastructure to manage",icon:"ti-database",ibg:"#e6f3e0",icl:"#2d6e18",badges:[{t:"Data Warehouse",c:"b-green"},{t:"Google Cloud",c:"b-blue"},{t:"Serverless",c:"b-teal"},{t:"Petabyte scale",c:"b-amber"}],an:{h:"BigQuery is like having a Google-scale data centre that runs your SQL queries.",b:"Traditional databases struggle with tables of hundreds of millions of rows. BigQuery was designed for petabyte queries — it distributes your SQL across thousands of machines in parallel and returns results in seconds, with zero servers to manage."},bl:[{n:"Spotify's music analytics",d:"Querying billions of stream events to understand listening patterns"},{n:"Verizon's network analytics",d:"Processing petabytes of network telemetry data daily"},{n:"The New York Times reader analytics",d:"Understanding article engagement across millions of readers"},{n:"Wayfair's e-commerce analytics",d:"Customer behaviour analysis across billions of product interactions"}],kw:["Columnar storage & Dremel","Partitioning & clustering","BI Engine (in-memory acceleration)","BigQuery ML"],qs:["How does BigQuery's columnar storage model differ from row-based databases \u2014 what does it enable?","How have you optimised BigQuery queries to reduce cost and improve performance?","What is the difference between partitioned and clustered tables in BigQuery?","How does BigQuery ML work \u2014 what kinds of models can you train directly in BigQuery?","What is the difference between BigQuery slots and on-demand pricing?","How have you used BigQuery with Looker or Data Studio for business intelligence?"],code:"SELECT\n  DATE_TRUNC(order_date, MONTH) AS month,\n  SUM(revenue) AS total_revenue,\n  COUNT(DISTINCT user_id) AS unique_buyers\nFROM `project.dataset.orders`\nWHERE order_date >= '2024-01-01'\nGROUP BY 1\nORDER BY 1",pl:"Aggregates <strong>monthly revenue and unique buyers</strong> from a potentially multi-billion row orders table. BigQuery scans only the columns it needs and distributes across thousands of machines — returning results in seconds."},
salesforce:{cat:"CRM & Enterprise",name:"Salesforce",tl:"The world's leading CRM platform — manages customer relationships, sales pipelines, and business processes",icon:"ti-cloud",ibg:"#e8f1fb",icl:"#1558a0",badges:[{t:"CRM",c:"b-blue"},{t:"Enterprise",c:"b-teal"},{t:"Low-code",c:"b-green"},{t:"SaaS",c:"b-amber"}],an:{h:"Salesforce is like a super-powered address book combined with a business process engine.",b:"A basic address book holds contact info. Salesforce tracks every interaction with every customer — calls, emails, deals, support tickets — and automates follow-ups, approvals, and workflows. It becomes the central nervous system of a sales organisation."},bl:[{n:"Coca-Cola's sales operations",d:"Global sales team management and customer account tracking"},{n:"Amazon Web Services sales",d:"Enterprise deal tracking and partner relationship management"},{n:"American Red Cross",d:"Donor management, volunteer tracking, and disaster response"},{n:"T-Mobile customer service",d:"Call centre agents accessing full customer history in real time"}],kw:["Apex (Salesforce's Java-like language)","SOQL (Salesforce query language)","Lightning components","Flows & Process Builder"],qs:["What is the difference between Apex triggers and Flows in Salesforce \u2014 when would you use each?","How have you used SOQL to query Salesforce data \u2014 what are its limitations compared to SQL?","What is the difference between a Salesforce sandbox and a scratch org?","How does Salesforce's governor limits system work \u2014 what limits have you hit in practice?","What is Salesforce Lightning Web Components (LWC) and how does it differ from Aura?","How do you deploy Salesforce customisations safely \u2014 what is the recommended CI/CD approach?"],code:"trigger OpportunityTrigger on Opportunity (before insert) {\n  for (Opportunity opp : Trigger.new) {\n    if (opp.Amount > 100000) {\n      opp.RequiresApproval__c = true;\n    }\n  }\n}",pl:"An <strong>Apex trigger</strong> that automatically flags any opportunity over £100K as requiring approval — the moment a salesperson saves it. The business rule is enforced in code, not in a manual checklist."},
powerbi:{cat:"Data Engineering",name:"Power BI",tl:"Microsoft's business intelligence tool for creating interactive dashboards and reports from any data source",icon:"ti-chart-bar",ibg:"#fdf0d8",icl:"#8a5200",badges:[{t:"BI / Analytics",c:"b-amber"},{t:"Microsoft",c:"b-blue"},{t:"No-code",c:"b-purple"},{t:"Dashboards",c:"b-green"}],an:{h:"Power BI is like giving every business manager their own data analyst.",b:"Traditionally, getting a chart from data meant emailing the analytics team and waiting days. Power BI lets non-technical people connect to databases, Excel files, or APIs and build interactive dashboards with drag-and-drop. Insights in hours, not weeks."},bl:[{n:"HP's global sales dashboards",d:"Sales performance across 170+ countries visualised in Power BI"},{n:"Shell's energy analytics",d:"Real-time energy production and consumption dashboards"},{n:"Rolls-Royce engine monitoring",d:"Engine health metrics visualised for maintenance teams"},{n:"NHS hospital operations",d:"Patient flow, bed occupancy, and wait times for management"}],kw:["DAX (data analysis expressions)","Power Query (M language)","Data modelling & relationships","DirectQuery vs Import mode"],qs:["What is the difference between DAX measures and calculated columns in Power BI?","What is the difference between DirectQuery and Import mode \u2014 when would you choose each?","What is a star schema and why is it the recommended data model for Power BI?","How have you optimised a slow Power BI report \u2014 what caused the performance issue?","What is row-level security (RLS) in Power BI and how have you implemented it?","How do you publish and manage Power BI reports across an organisation \u2014 what governance have you applied?"],code:"Revenue YoY Growth =\nDIVIDE(\n  [Total Revenue] - CALCULATE(\n    [Total Revenue],\n    SAMEPERIODLASTYEAR(Dates[Date])\n  ),\n  CALCULATE(\n    [Total Revenue],\n    SAMEPERIODLASTYEAR(Dates[Date])\n  )\n)",pl:"A DAX measure calculating <strong>year-over-year revenue growth</strong>. SAMEPERIODLASTYEAR is a time intelligence function that automatically finds the same period in the previous year — one formula that works for any date selection on the dashboard."},
tableau:{cat:"Data Engineering",name:"Tableau",tl:"A powerful visual analytics platform for creating interactive data visualisations and business dashboards",icon:"ti-chart-dots",ibg:"#e8f1fb",icl:"#1558a0",badges:[{t:"BI / Analytics",c:"b-blue"},{t:"Salesforce",c:"b-teal"},{t:"Visualisation",c:"b-green"},{t:"No-code",c:"b-amber"}],an:{h:"Tableau is like a paintbrush for your data.",b:"Spreadsheets can produce basic bar charts. Tableau lets you create rich, interactive, beautiful visualisations from millions of rows of data — dragging fields onto a canvas, filtering interactively, and publishing dashboards that update automatically."},bl:[{n:"Verizon's executive dashboards",d:"C-suite reporting on network performance and revenue"},{n:"Citibank's risk analytics",d:"Real-time financial risk visualisation for traders"},{n:"Netflix content analytics",d:"Understanding viewing patterns, ratings, and content performance"},{n:"WHO pandemic monitoring",d:"COVID-19 tracking dashboards used by governments worldwide"}],kw:["Calculated fields & LOD expressions","Data blending & joins","Dashboard design & interactivity","Tableau Server / Tableau Cloud"],qs:["What is the difference between a fixed LOD expression and a context filter in Tableau?","How have you optimised a slow Tableau dashboard \u2014 what caused the performance issue?","What is the difference between a Tableau extract and a live connection?","How do you use Tableau's table calculations \u2014 can you give a real-world example?","What is Tableau Prep and how does it fit into a data pipeline?","How have you implemented row-level security in Tableau?"],code:"// Profit Margin\nSUM([Profit]) / SUM([Sales])\n\n// LOD: Avg sales per customer\n{ FIXED [Customer ID]: AVG([Sales]) }",pl:"The first formula calculates <strong>profit margin</strong> across whatever filters are applied. The LOD expression calculates average sales per customer regardless of other filters — a powerful feature mixing aggregation levels in one view."},
solidity:{cat:"Blockchain",name:"Solidity",tl:"The programming language for writing Ethereum smart contracts — self-executing agreements stored on the blockchain",icon:"ti-currency-ethereum",ibg:"#efedfd",icl:"#4a3db0",badges:[{t:"Blockchain",c:"b-purple"},{t:"Ethereum",c:"b-blue"},{t:"Smart contracts",c:"b-teal"},{t:"Web3",c:"b-green"}],an:{h:"Solidity is like writing a contract that enforces itself automatically.",b:"A traditional contract needs lawyers and courts to enforce it. A Solidity smart contract is code stored on the blockchain — when conditions are met, it executes automatically without any intermediary. No bank needed, no middleman needed to release escrow."},bl:[{n:"Uniswap decentralised exchange",d:"Billions of dollars of token swaps executed by Solidity contracts"},{n:"OpenSea NFT marketplace",d:"NFT minting, ownership, and trading governed by smart contracts"},{n:"Aave lending protocol",d:"Lending and borrowing without a bank — all via Solidity contracts"},{n:"Chainlink oracles",d:"Smart contracts that fetch real-world data from external sources"}],kw:["Smart contract development","ERC-20 / ERC-721 (token standards)","Hardhat / Truffle (dev frameworks)","Gas optimisation"],qs:["What is the difference between a function marked view vs pure vs payable in Solidity?","What is a reentrancy attack and how do you prevent it in a Solidity smart contract?","What is the difference between storage and memory in Solidity \u2014 why does it matter for gas?","What is an ERC-20 token standard \u2014 what functions must a contract implement?","How do you test Solidity contracts \u2014 what frameworks have you used?","What is a Solidity proxy pattern and why would you use it for upgradeable contracts?"],code:"contract Token {\n  mapping(address => uint) balances;\n\n  function transfer(address to, uint amount) public {\n    require(balances[msg.sender] >= amount);\n    balances[msg.sender] -= amount;\n    balances[to] += amount;\n  }\n}",pl:"A basic <strong>token transfer function</strong>: check the sender has enough, subtract from their balance, add to the recipient. This code runs on the Ethereum blockchain, enforced by thousands of nodes worldwide — no bank, no API, no central server."},
webpack:{cat:"Tooling",name:"Webpack",tl:"A module bundler that packages JavaScript, CSS, and assets into optimised files for production",icon:"ti-package",ibg:"#e8f1fb",icl:"#1558a0",badges:[{t:"Build tool",c:"b-blue"},{t:"JavaScript",c:"b-amber"},{t:"Bundler",c:"b-teal"},{t:"Open Source",c:"b-green"}],an:{h:"Webpack is like a factory assembling thousands of parts into one finished product.",b:"Modern web apps import hundreds of files — JavaScript modules, CSS, images, fonts. Browsers would choke on hundreds of separate requests. Webpack bundles everything into a handful of optimised files, tree-shakes unused code, and minifies the result."},bl:[{n:"Create React App",d:"Under the hood of every CRA project is preconfigured Webpack"},{n:"Next.js production builds",d:"Webpack bundles Next.js applications for optimised delivery"},{n:"Shopify's storefront JS",d:"Complex e-commerce JavaScript bundled and code-split for performance"},{n:"Vue CLI projects",d:"Vue's official tooling wraps Webpack for production-ready bundling"}],kw:["Entry points & output","Loaders (babel-loader, css-loader)","Code splitting & tree shaking","Source maps"],qs:["What is the difference between Webpack loaders and plugins \u2014 can you give an example of each?","How have you used code splitting in Webpack to improve page load performance?","What is tree shaking in Webpack and what conditions must be met for it to work?","How do you configure Webpack for different environments \u2014 development vs production?","What is source mapping in Webpack and how does it help with debugging?","How have you migrated a project from Webpack to Vite \u2014 what were the main challenges?"],code:"module.exports = {\n  entry: './src/index.js',\n  output: { filename: 'bundle.[contenthash].js' },\n  module: {\n    rules: [{ test: /\\.jsx?$/, use: 'babel-loader' }]\n  }\n}",pl:"The <strong>Webpack configuration</strong>: start from index.js, process all .js/.jsx files through Babel (which converts modern JS to browser-compatible code), output one optimised bundle with a cache-busting hash."},
vite:{cat:"Tooling",name:"Vite",tl:"A blazing-fast build tool and dev server using native ES modules — replacing Webpack for many modern projects",icon:"ti-bolt",ibg:"#efedfd",icl:"#4a3db0",badges:[{t:"Build tool",c:"b-purple"},{t:"JavaScript",c:"b-amber"},{t:"Fast",c:"b-blue"},{t:"ESM",c:"b-green"}],an:{h:"Vite is like Webpack on a rocket ship.",b:"Webpack bundles everything before you can see it — which gets slow as apps grow. Vite skips bundling entirely during development, using the browser's native module support. Changes appear in milliseconds. Production builds are still fully optimised."},bl:[{n:"Vue 3 projects",d:"Vite is the official recommended build tool for Vue 3"},{n:"SvelteKit",d:"Svelte's full-stack framework uses Vite under the hood"},{n:"Astro static sites",d:"The static site generator uses Vite for instant HMR"},{n:"New React projects",d:"Vite is increasingly replacing Create React App as the default"}],kw:["Native ES modules (dev)","Hot Module Replacement (HMR)","Rollup (production builds)","Plugin ecosystem"],qs:["What is the fundamental difference between how Vite and Webpack handle development builds?","How have you configured Vite for a monorepo or a project with multiple entry points?","How does Vite's HMR (Hot Module Replacement) work and why is it faster than Webpack's?","What is Rollup and how does Vite use it for production builds?","How do you write a custom Vite plugin \u2014 what hook APIs are available?","How have you handled environment variables and .env files in a Vite project?"],code:"export default {\n  plugins: [react()],\n  server: { port: 3000 },\n  build: {\n    rollupOptions: {\n      output: { manualChunks: { vendor: ['react','react-dom'] } }\n    }\n  }\n}",pl:"Vite config enables React support, sets the dev server port, and tells production builds to put React into a <strong>separate vendor chunk</strong> — so users don't re-download React when only your app code changed."},
objectivec:{cat:"Mobile",name:"Objective-C",tl:"Apple's original language for iOS and macOS development — still found in large legacy codebases",icon:"ti-code",ibg:"#fdf0d8",icl:"#8a5200",badges:[{t:"Mobile",c:"b-amber"},{t:"Legacy iOS",c:"b-red"},{t:"Apple",c:"b-blue"},{t:"C-based",c:"b-teal"}],an:{h:"Objective-C is like a vintage car — runs perfectly but requires specialist mechanics.",b:"Objective-C was the only way to build iOS apps before Swift (2014). It still powers large legacy codebases at banks, healthcare companies, and enterprises that haven't fully migrated. Knowing it means you can maintain those systems and incrementally migrate them."},bl:[{n:"LinkedIn iOS (legacy)",d:"Original iOS client built in Objective-C, gradually migrated to Swift"},{n:"Large banking apps",d:"Enterprise iOS apps with decade-old codebases still in Objective-C"},{n:"Adobe Creative Suite iOS",d:"Complex media editing apps with legacy C/Objective-C code"},{n:"Healthcare enterprise apps",d:"FDA-approved medical apps requiring stability over modernisation"}],kw:["MRC / ARC (memory management)","Cocoa Touch framework","Interoperability with Swift","Xcode & Interface Builder"],qs:["How do you approach migrating an Objective-C codebase to Swift \u2014 what strategy have you used?","What is the difference between ARC and manual memory management in Objective-C?","What is a delegate pattern in Objective-C and how is it commonly used in iOS frameworks?","What is the difference between categories and subclasses in Objective-C?","How does message passing in Objective-C differ from method calling in other languages?","What are blocks in Objective-C and how do they compare to closures in Swift?"],code:"- (NSString *)greetUser:(NSString *)name {\n  return [NSString stringWithFormat:\n    @\"Hello, %@!\", name];\n}",pl:"A classic <strong>Objective-C method</strong> with its distinctive square-bracket syntax. The minus sign means it is an instance method. Still running in millions of apps today. mlflow:{cat:"AI & Data Science",name:"MLflow",tl:"An open-source platform for managing the full ML lifecycle — experiment tracking, model versioning, and deployment",icon:"ti-chart-line",ibg:"#e0f4ee",icl:"#0d6e54",badges:[{t:"MLOps",c:"b-teal"},{t:"Experiment tracking",c:"b-blue"},{t:"Databricks",c:"b-amber"},{t:"Open Source",c:"b-green"}],an:{h:"MLflow is like a lab notebook combined with a model filing cabinet.",b:"Data scientists run hundreds of experiments tweaking parameters. Without MLflow, you forget which configuration produced your best model. MLflow automatically logs every experiment — parameters, metrics, and the trained model — so you can always go back to what worked."},bl:[{n:"Microsoft's ML platform",d:"Tracking thousands of model training runs across Azure"},{n:"Databricks customers",d:"Experiment tracking for enterprise ML teams"},{n:"Booking.com pricing models",d:"Versioning and deploying hotel pricing prediction models"},{n:"Walmart demand forecasting",d:"Managing the full lifecycle of inventory prediction models"}],kw:["Experiment tracking (params/metrics)","Model registry & versioning","MLflow Projects","Model serving & deployment"],qs:["How have you used MLflow to manage model versions in production \u2014 what was the deployment workflow?","What is the difference between MLflow's model flavors \u2014 when would you use pyfunc vs sklearn?","How do you organise MLflow experiments across a team with multiple data scientists?","What is the MLflow Model Registry and how does it support model promotion across environments?","How do you log custom metrics and artifacts in an MLflow run?","How have you integrated MLflow into a CI/CD pipeline for automated model retraining?"],code:"with mlflow.start_run():\n  mlflow.log_param('lr', 0.01)\n  mlflow.log_metric('accuracy', 0.94)\n  mlflow.sklearn.log_model(model, 'model')",pl:"Logs <strong>hyperparameters, performance metrics, and the trained model</strong> in one block. You can later compare this run to hundreds of others and promote the best model to production with one click."},
rabbitmq:{cat:"DevOps & Cloud",name:"RabbitMQ",tl:"A message broker enabling reliable asynchronous communication between microservices and distributed systems",icon:"ti-messages",ibg:"#fdf0d8",icl:"#8a5200",badges:[{t:"Messaging",c:"b-amber"},{t:"Microservices",c:"b-blue"},{t:"Erlang",c:"b-red"},{t:"AMQP",c:"b-teal"}],an:{h:"RabbitMQ is like a sorting room between departments in a large office.",b:"When one service wants to tell another something, instead of calling it directly (which fails if it is down), it drops a message in RabbitMQ. The other service picks it up when ready. Services are decoupled — the sender does not wait, the receiver processes at its own pace."},bl:[{n:"Instagram notifications",d:"Async delivery of likes, comments, and follow notifications"},{n:"Zalando's order processing",d:"Order events routed to warehouse, payment, and email services"},{n:"Trivago hotel search",d:"Search requests fanned out to dozens of hotel provider APIs"},{n:"Healthcare lab results",d:"Lab results queued for delivery to patient apps and physician portals"}],kw:["Exchanges, queues & bindings","AMQP protocol","Dead letter queues","Consumer acknowledgements"],qs:["What is the difference between RabbitMQ and Kafka \u2014 when would you choose RabbitMQ?","How do you ensure a RabbitMQ message is not lost if a consumer crashes mid-processing?","What is the difference between a direct, fanout, topic, and headers exchange in RabbitMQ?","What is a dead letter queue in RabbitMQ and how have you used it?","How do you scale RabbitMQ consumers \u2014 what is the role of consumer prefetch count?","How have you monitored RabbitMQ in production \u2014 what metrics matter most?"],code:"channel.basic_publish(\n  exchange='orders',\n  routing_key='new_order',\n  body=json.dumps(order),\n  properties=pika.BasicProperties(delivery_mode=2)\n)",pl:"Publishes an order event to the orders exchange. <strong>delivery_mode=2</strong> makes the message persistent — it survives a broker restart. The nginx:{cat:"DevOps & Cloud",name:"Nginx",tl:"A high-performance web server and reverse proxy — the traffic cop sitting in front of most web applications",icon:"ti-server",ibg:"#e6f3e0",icl:"#2d6e18",badges:[{t:"Web Server",c:"b-green"},{t:"Reverse Proxy",c:"b-blue"},{t:"Load Balancer",c:"b-teal"},{t:"High Performance",c:"b-amber"}],an:{h:"Nginx is like a receptionist routing visitors to the right department.",b:"When millions of requests hit a site, Nginx receives every one and routes it to the right backend server, caches static files, terminates SSL, and distributes traffic across server pools. It handles 10,000 concurrent connections on a single machine."},bl:[{n:"Netflix's edge layer",d:"Serving static assets and routing traffic to hundreds of microservices"},{n:"Airbnb's infrastructure",d:"Reverse proxying to backend services with SSL termination"},{n:"WordPress hosting platforms",d:"Web server for millions of WordPress sites globally"},{n:"Cloudflare's network",d:"Core to Cloudflare's reverse proxy and CDN edge infrastructure"}],kw:["Reverse proxy configuration","Load balancing (round-robin, IP hash)","SSL/TLS termination","Rate limiting & caching"],qs:["What is the difference between a web server and a reverse proxy \u2014 how does Nginx serve both roles?","How have you configured Nginx for upstream load balancing and health checks?","What is the difference between Nginx's worker_processes and worker_connections settings?","How have you configured SSL/TLS termination in Nginx?","How do you configure Nginx rate limiting to protect an API from abuse?","What is the difference between Nginx and Apache \u2014 when would you choose Nginx?"],code:"upstream backend {\n  server app1:3000;\n  server app2:3000;\n}\nserver {\n  listen 80;\n  location / {\n    proxy_pass http://backend;\n  }\n}",pl:"Configures Nginx as a <strong>load balancer</strong>: incoming requests are distributed across app1 and app2 in round-robin. If one crashes, Nginx automatically routes all traffic to the surviving server."},
prometheus:{cat:"DevOps & Cloud",name:"Prometheus",tl:"An open-source monitoring system that scrapes time-series metrics from your infrastructure and applications",icon:"ti-activity",ibg:"#fdf0d8",icl:"#8a5200",badges:[{t:"Monitoring",c:"b-amber"},{t:"Metrics",c:"b-red"},{t:"CNCF",c:"b-blue"},{t:"Time-series",c:"b-teal"}],an:{h:"Prometheus is like a nurse taking your server's vital signs every 15 seconds.",b:"Just as a nurse records heart rate, blood pressure, and temperature at regular intervals, Prometheus scrapes CPU usage, memory, request rates, and error rates from every service. When something goes wrong, you have the history to pinpoint exactly when it started."},bl:[{n:"SoundCloud (Prometheus's birthplace)",d:"Built internally at SoundCloud to monitor their microservices"},{n:"Kubernetes monitoring",d:"Prometheus is the default monitoring stack for every Kubernetes cluster"},{n:"GitLab's infrastructure",d:"Monitoring thousands of servers and service instances in production"},{n:"Shopify's SRE platform",d:"Alerting and dashboards for 99.99% uptime of the largest e-commerce platform"}],kw:["PromQL (query language)","Scrape targets & exporters","Alertmanager","Grafana (visualisation)"],qs:["How does Prometheus's pull model differ from traditional monitoring's push model?","How have you written PromQL queries to create meaningful SLO-based alerts?","What is the difference between a counter, gauge, histogram, and summary in Prometheus?","How does Prometheus service discovery work \u2014 how does it find targets to scrape?","What is the Alertmanager and how does it route and deduplicate alerts?","How have you handled Prometheus high availability and long-term storage at scale?"],code:"rate(http_requests_total{status='500'}[5m])\n\nalert: HighErrorRate\ncondition: error_rate > 0.05\nfor: 2m\nmessage: 'Error rate above 5% for 2 minutes'",pl:"The PromQL query calculates the <strong>rate of 500 errors per second</strong> over the last 5 minutes. The alert fires if it grafana:{cat:"DevOps & Cloud",name:"Grafana",tl:"The open-source analytics and visualisation platform for metrics, logs, and traces from any data source",icon:"ti-chart-bar",ibg:"#fdf0d8",icl:"#8a5200",badges:[{t:"Visualisation",c:"b-amber"},{t:"Monitoring",c:"b-red"},{t:"Dashboards",c:"b-blue"},{t:"Open Source",c:"b-teal"}],an:{h:"Grafana is like a flight instrument panel for your infrastructure.",b:"A plane cockpit shows speed, altitude, and engine status in one glance. Grafana creates dashboards pulling metrics from Prometheus, logs from Loki, and traces from Jaeger — giving engineers a single pane of glass across their entire stack."},bl:[{n:"DigitalOcean's monitoring",d:"Customer-facing infrastructure dashboards for all cloud resources"},{n:"CERN's accelerator monitoring",d:"Real-time dashboards tracking particle beam experiments"},{n:"GitHub's engineering metrics",d:"Internal dashboards for deployment frequency and system health"},{n:"Roblox gaming infrastructure",d:"Real-time player count, server load, and game session metrics"}],kw:["Dashboard creation","PromQL / Loki queries","Alerting rules","Data source connectors"],qs:["How have you built Grafana dashboards to support incident response \u2014 what metrics do you display?","What is the difference between Grafana Loki and Elasticsearch for log aggregation?","How do you create meaningful Grafana alerts \u2014 what makes a good alerting threshold?","What is Grafana's templating feature and how have you used it to make dashboards reusable?","How have you used Grafana with multiple data sources in one dashboard?","What is the difference between Grafana Cloud and self-hosted Grafana?"],code:"// Panel query (PromQL)\nsum(rate(http_requests_total[5m]))\n  by (service)\n\n// Alert condition\nWHEN avg() OF query IS ABOVE 1000",pl:"A Grafana panel showing <strong>request rate per service</strong> in real time. The alert fires when average requests exceed 1,000 per second — the dashboard turns red and pagers start going off."},
pytest_fw:{cat:"Testing & Security",name:"pytest",tl:"Python's most popular testing framework — clean, concise, and extensible for unit, integration, and API tests",icon:"ti-test-pipe",ibg:"#e6f3e0",icl:"#2d6e18",badges:[{t:"Testing",c:"b-green"},{t:"Python",c:"b-blue"},{t:"Open Source",c:"b-teal"},{t:"Fixtures",c:"b-amber"}],an:{h:"pytest is like a Swiss Army knife for Python testing.",b:"Python's built-in unittest framework is verbose and cumbersome. pytest uses plain functions and minimal syntax — write a function starting with test_, and pytest finds and runs it automatically. Fixtures handle setup and teardown elegantly."},bl:[{n:"Django REST API test suites",d:"Testing endpoints, serializers, and model logic in isolation"},{n:"Data pipeline validation",d:"Verifying data transformations produce correct outputs"},{n:"FastAPI application tests",d:"Testing async endpoints with pytest-asyncio"},{n:"ML model regression tests",d:"Checking that model outputs don't change unexpectedly between versions"}],kw:["Fixtures (setup/teardown)","Parametrize (data-driven tests)","Conftest.py","Plugins (pytest-cov, pytest-asyncio)"],qs:["How do pytest fixtures work \u2014 what is the difference between function, module, and session scope?","How have you used parametrize to run the same test against many inputs?","What is the difference between pytest and unittest \u2014 why do most Python teams prefer pytest?","How have you structured a large pytest test suite \u2014 what folder conventions do you follow?","How do you mock dependencies in pytest \u2014 what is the difference between monkeypatch and unittest.mock?","How have you integrated pytest with CI and measured coverage \u2014 what coverage threshold do you enforce?"],code:"import pytest\n\n@pytest.mark.parametrize('a,b,expected', [\n  (2, 3, 5), (-1, 1, 0), (0, 0, 0)\n])\ndef test_add(a, b, expected):\n  assert add(a, b) == expected",pl:"The <strong>@parametrize decorator</strong> runs the same test three times with differe fastapi:{cat:"Backend",name:"FastAPI",tl:"A modern Python web framework for building high-performance APIs with automatic documentation and type validation",icon:"ti-bolt",ibg:"#e6f3e0",icl:"#2d6e18",badges:[{t:"Backend",c:"b-green"},{t:"Python",c:"b-blue"},{t:"Async",c:"b-teal"},{t:"OpenAPI",c:"b-amber"}],an:{h:"FastAPI is like Django's younger sibling who discovered async programming.",b:"Django is batteries-included but synchronous. FastAPI was built from scratch for async Python — using type hints to validate inputs, auto-generate OpenAPI docs, and process requests concurrently. It benchmarks near Node.js and Go in performance."},bl:[{n:"Microsoft's internal APIs",d:"FastAPI powers internal tooling and ML model serving at Microsoft"},{n:"Uber's ML serving layer",d:"High-throughput model inference APIs built with FastAPI"},{n:"Netflix's tooling APIs",d:"Internal developer tooling and automation APIs"},{n:"Startups' MVP APIs",d:"FastAPI's fast development cycle and auto-docs make it ideal for rapid iteration"}],kw:["Pydantic (data validation)","Async/await support","OpenAPI auto-documentation","Dependency injection"],qs:["How does FastAPI's dependency injection system work \u2014 what problems does it solve?","What is the difference between FastAPI and Flask \u2014 when would you choose each?","How does Pydantic validation work in FastAPI \u2014 what happens when validation fails?","How have you handled authentication and authorisation in a FastAPI application?","How do you write async endpoints in FastAPI \u2014 what workloads benefit most from async?","How have you handled background tasks in FastAPI \u2014 what is the BackgroundTasks class?"],code:"@app.get('/users/{user_id}')\nasync def get_user(user_id: int) -> UserSchema:\n  user = await db.get(user_id)\n  if not user:\n    raise HTTPException(404, 'Not found')\n  return user",pl:"An <strong>async API endpoint</strong>: the user_id type hint auto-validates the input, UserSchema auto-generates the OpenAPI doc laravel:{cat:"Backend",name:"Laravel",tl:"The elegant PHP framework — the most popular and developer-friendly way to build modern PHP web applications",icon:"ti-brand-laravel",ibg:"#fdeaea",icl:"#9b2222",badges:[{t:"Backend",c:"b-red"},{t:"PHP",c:"b-purple"},{t:"Full-stack",c:"b-blue"},{t:"MVC",c:"b-teal"}],an:{h:"Laravel is what happens when a great developer redesigns PHP from scratch.",b:"Raw PHP can be a mess. Laravel wraps it in a clean MVC architecture with an expressive ORM, built-in auth, queue management, and developer tooling. It is the framework that brought modern software engineering practices to the PHP world."},bl:[{n:"Invoice Ninja",d:"Open-source invoicing platform serving tens of thousands of businesses"},{n:"Laracasts learning platform",d:"Developer education platform built entirely on Laravel"},{n:"MyRank.in",d:"Large-scale student ranking and test platform in India"},{n:"countless SaaS startups",d:"Laravel's starter kits make SaaS subscription apps fast to build"}],kw:["Eloquent ORM","Artisan CLI","Queues & Jobs","Blade templating"],qs:["What is the difference between Laravel's hasMany and belongsToMany relationships?","How have you used Laravel queues in production \u2014 what driver and monitoring?","What is Laravel's service container and how does dependency injection work in Laravel?","How do you handle database transactions in Laravel \u2014 when would you use them?","What is the difference between Laravel's Blade templating and Inertia.js?","How have you written and organised tests in a Laravel application?"],code:"Route::get('/users', [UserController::class, 'index']);\n\n// UserController\npublic function index() {\n  return User::where('active', true)\n    ->latest()\n    ->paginate(20);\n}",pl:"A clean Laravel route and controller: returns <strong>the 20 most recent active users</strong> with built-in pagination. Laravel's Eloquent ORM makes this database query readable as a sentence."},

aspnetcore:{cat:"Backend",name:"ASP.NET Core",tl:"Microsoft's cross-platform, high-performance framework for building web APIs and web apps in C#",icon:"ti-brand-csharp",ibg:"#efedfd",icl:"#4a3db0",badges:[{t:"Backend",c:"b-purple"},{t:"Microsoft",c:"b-blue"},{t:"C# / .NET",c:"b-teal"},{t:"Cross-platform",c:"b-green"}],an:{h:"ASP.NET Core is Spring Boot for the Microsoft world.",b:"Just as Spring Boot is the standard for Java enterprise APIs, ASP.NET Core is the go-to for C# web APIs. It runs on Linux, Windows, and macOS, handles millions of requests per second, and integrates perfectly with Azure and the Microsoft ecosystem."},bl:[{n:"Stack Overflow's API",d:"The world's most visited developer Q&A platform runs on ASP.NET Core"},{n:"GoDaddy's domain services",d:"Domain registration and management APIs at massive scale"},{n:"Siemens industrial APIs",d:"Manufacturing and automation data APIs in .NET"},{n:"Microsoft's own cloud services",d:"Many Azure services expose their APIs via ASP.NET Core"}],kw:["Minimal API / Controller pattern","Middleware pipeline","Entity Framework Core","Dependency injection (built-in)"],qs:["What is the difference between ASP.NET Core's minimal API and controller-based routing?","How does ASP.NET Core's dependency injection container differ from Spring's?","How have you implemented authentication in ASP.NET Core \u2014 JWT, cookie, or OAuth?","What is ASP.NET Core's middleware pipeline and how do you add custom middleware?","How does model binding work in ASP.NET Core \u2014 what happens when validation fails?","How have you deployed an ASP.NET Core application \u2014 IIS, Kestrel, or Docker?"],code:"app.MapGet('/users/{id}', async (int id, AppDbContext db) => {\n  var user = await db.Users.FindAsync(id);\n  return user is null ? Results.NotFound() : Results.Ok(user);\n});",pl:"A <strong>minimal API endpoint</strong> in ASP.NET Core. The id and db parameters are automatically injected — .NET resolves the database context from the DI contai
